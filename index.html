<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Altruan Bot Manager</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0efeb;min-height:100vh}
  @keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}
  @keyframes spin{to{transform:rotate(360deg)}}
  ::-webkit-scrollbar{width:4px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:#ccc;border-radius:2px}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ── Constants ────────────────────────────────────────────────────────────────
const TP = "#464775";
const USERS = [
  { id:1, init:"TG", name:"Tobias Gumtow",  role:"Leiter Logistik",  admin:false, bg:"#CECBF6", tc:"#3C3489" },
  { id:2, init:"NB", name:"Nina Becker",    role:"Sachbearbeiterin", admin:false, bg:"#9FE1CB", tc:"#085041" },
  { id:3, init:"LF", name:"Lars Fischer",   role:"Lagerist",         admin:false, bg:"#B5D4F4", tc:"#0C447C" },
  { id:4, init:"AD", name:"Admin",          role:"Vollzugriff",      admin:true,  bg:"#D3D1C7", tc:"#444441" },
  { id:5, init:"JP", name:"Jonas Püttmann", role:"Administrator",    admin:true,  bg:"#CECBF6", tc:"#3C3489" },
];

const DEFAULT_APIS = [
  { id:1,  name:"Salesforce",      cat:"CRM",        key:"sf_••••••2b19",   url:"api.salesforce.com/v58",             env:"prod",  status:"active" },
  { id:2,  name:"Zendesk",         cat:"Ticketing",  key:"zd_••••••5e72",   url:"{tenant}.zendesk.com/api/v2",        env:"prod",  status:"warn" },
  { id:3,  name:"Jira",            cat:"Ticketing",  key:"jira_••••7d88",   url:"{domain}.atlassian.net/rest/api/3",  env:"prod",  status:"active" },
  { id:4,  name:"Weclapp",         cat:"ERP",        key:"wc_••••••3f2a",   url:"{tenant}.weclapp.com/webapp/api/v1", env:"prod",  status:"active" },
  { id:5,  name:"Pulpo WMS",       cat:"WMS",        key:"pu_••••••9c41",   url:"api.pulpo.com/v2",                   env:"prod",  status:"active" },
  { id:6,  name:"DHL",             cat:"Carrier",    key:"dhl_•••••4a03",   url:"api.dhl.com/v1",                     env:"prod",  status:"active" },
  { id:7,  name:"DB Schenker",     cat:"Carrier",    key:"— ausstehend",    url:"api.dbschenker.com/v1",              env:"prod",  status:"inactive" },
  { id:8,  name:"Microsoft Teams", cat:"Messaging",  key:"az_••••••7b25",   url:"smba.trafficmanager.net/amer",       env:"stage", status:"warn" },
  { id:9,  name:"Shopify",         cat:"Shop",       key:"— ausstehend",    url:"{shop}.myshopify.com/admin/api",     env:"prod",  status:"inactive" },
  { id:10, name:"Miracle",         cat:"Marktplatz", key:"— ausstehend",    url:"api.miracle.cloud/v1",               env:"prod",  status:"inactive" },
];

const SYSTEM_PROMPT = `Du bist der "Altruan Assistent" – ein KI-Logistik-Assistent der Firma Altruan.
Du hilfst Mitarbeitern bei allem rund um Logistik, Lager und interne Systeme. Antworte immer auf Deutsch, präzise, freundlich und professionell.

Verbundene Systeme: Weclapp (ERP), Pulpo WMS, Jira, Zendesk, Salesforce, DHL, DB Schenker, Shopify, Miracle (Amazon/Shop Apotheke), Microsoft Teams.

Sync-Intervalle: Lieferungen alle 3 Min · Lieferantenbestellungen alle 20 Min · Produkte alle 60 Min.
Nach 2 fehlgeschlagenen Sync-Versuchen: automatisch Jira-Ticket erstellen.
Bei Adressfehlern: IMMER vollständige Adresse (Name, Straße, PLZ, Stadt, Land) anfordern – nie raten.
Halte Antworten kurz und direkt.`;

const MOCK_ORDERS = {
  "ORD-10042": { email:"jonas.puettmann@altruan.de", name:"Jonas Püttmann", items:"Schreibtischlampe LED Pro × 2", status:"Versandt", carrier:"DHL", tracking:"1234567890", eta:"Morgen bis 18 Uhr" },
  "TEST-0001": { email:"test@test.de", name:"Test Kunde", items:"Testartikel × 1", status:"Versandt", carrier:"DHL", tracking:"9876543210", eta:"Übermorgen" },
};

const now = () => { const d=new Date(); return d.getHours()+":"+String(d.getMinutes()).padStart(2,"0"); };
const uid = () => Date.now()+Math.random();

// ── Shared UI ────────────────────────────────────────────────────────────────
const Av = ({init,bg,tc,size=32,online=false}) => (
  <div style={{position:"relative",flexShrink:0}}>
    <div style={{width:size,height:size,borderRadius:"50%",background:bg,color:tc,display:"flex",alignItems:"center",justifyContent:"center",fontSize:size*.34,fontWeight:500}}>{init}</div>
    {online&&<div style={{width:9,height:9,borderRadius:"50%",background:"#639922",position:"absolute",bottom:0,right:0,border:"2px solid white"}}/>}
  </div>
);

const Btn = ({children,primary,danger,onClick,small,disabled}) => (
  <button onClick={onClick} disabled={disabled} style={{
    fontSize:small?11:12,padding:small?"4px 10px":"7px 14px",borderRadius:7,fontFamily:"inherit",
    border:`0.5px solid ${primary?"#534AB7":danger?"#E24B4A":"#ccc"}`,
    background:primary?"#534AB7":danger?"#FCEBEB":"white",
    color:primary?"#EEEDFE":danger?"#A32D2D":"#444",
    cursor:disabled?"default":"pointer",opacity:disabled?.5:1,
    display:"inline-flex",alignItems:"center",gap:5
  }}>{children}</button>
);

const Card = ({color,icon,title,rows}) => (
  <div style={{borderRadius:10,overflow:"hidden",border:`0.5px solid ${color.border}`,borderLeft:`3px solid ${color.strong}`,maxWidth:"88%",background:"white"}}>
    <div style={{padding:"8px 12px",background:color.bg,color:color.text,fontSize:12,fontWeight:500}}>{icon} {title}</div>
    <div style={{background:"#f8f8f7",padding:"7px 12px"}}>
      {rows.map((r,i)=>(
        <div key={i} style={{display:"flex",justifyContent:"space-between",fontSize:11,padding:"3px 0",borderBottom:i<rows.length-1?"0.5px solid #eee":"none"}}>
          <span style={{color:"#888"}}>{r[0]}</span>
          <span style={{fontWeight:500,color:r[2]==="red"?"#A32D2D":r[2]==="green"?"#3B6D11":r[2]==="amber"?"#854F0B":"#333"}}>{r[1]}</span>
        </div>
      ))}
    </div>
  </div>
);

const Typing = () => (
  <div style={{display:"flex",gap:8,alignItems:"flex-end"}}>
    <Av init="AA" bg="#EEEDFE" tc="#534AB7" size={26}/>
    <div style={{background:"#f1f0eb",border:"0.5px solid #e0dfd8",borderRadius:11,borderBottomLeftRadius:3,padding:"9px 12px",display:"flex",gap:4}}>
      {[0,150,300].map(d=><div key={d} style={{width:5,height:5,borderRadius:"50%",background:"#aaa",animation:`bounce .9s ${d}ms infinite`}}/>)}
    </div>
  </div>
);

// ── EAN Form ─────────────────────────────────────────────────────────────────
const EANForm = ({onSubmit,onCancel}) => {
  const [e1,setE1]=useState(""); const [e2,setE2]=useState(""); const [err,setErr]=useState("");
  const ok=v=>/^\d{8}$|^\d{13}$/.test(v);
  const submit=()=>{
    if(!e1||!e2||!ok(e1)||!ok(e2)){setErr("Bitte gültige EAN-8 oder EAN-13 eingeben.");return;}
    onSubmit(e1,e2);
  };
  const IS={width:"100%",padding:"7px 10px",borderRadius:7,border:"0.5px solid #ccc",fontSize:12,fontFamily:"monospace",boxSizing:"border-box",marginBottom:8};
  return (
    <div style={{borderRadius:11,overflow:"hidden",border:"1.5px solid #534AB7",maxWidth:"90%"}}>
      <div style={{padding:"9px 12px",background:"#EEEDFE",color:"#3C3489",fontSize:12,fontWeight:500}}>🔢 Fehlende EAN ergänzen – Bestellung P91111</div>
      <div style={{padding:12,background:"white"}}>
        <div style={{padding:"7px 10px",background:"#FAEEDA",borderRadius:7,borderLeft:"3px solid #EF9F27",marginBottom:9,fontSize:11,color:"#633806"}}>
          <strong style={{color:"#854F0B"}}>2 Artikel ohne EAN</strong> – Transfer blockiert
        </div>
        <div style={{fontSize:11,color:"#888",marginBottom:3}}>Artikel 1 – Schreibtischlampe LED Pro (WC-00441)</div>
        <input value={e1} onChange={e=>setE1(e.target.value)} placeholder="EAN-13, z.B. 4006381333931" maxLength={14} style={IS}/>
        <div style={{fontSize:11,color:"#888",marginBottom:3}}>Artikel 2 – USB-C Hub 7-Port (WC-00519)</div>
        <input value={e2} onChange={e=>setE2(e.target.value)} placeholder="EAN-13, z.B. 4006381445021" maxLength={14} style={{...IS,marginBottom:err?6:0}}/>
        {err&&<div style={{fontSize:11,color:"#A32D2D",marginBottom:4}}>{err}</div>}
      </div>
      <div style={{padding:"8px 12px",background:"#f8f8f7",display:"flex",gap:6,borderTop:"0.5px solid #eee"}}>
        <Btn primary small onClick={submit}>✓ EAN speichern & Sync starten</Btn>
        <Btn small onClick={()=>onCancel("jira")} style={{borderColor:"#EF9F27",color:"#854F0B"}}>Jira-Ticket</Btn>
        <Btn small onClick={()=>onCancel("cancel")}>Abbrechen</Btn>
      </div>
    </div>
  );
};

// ── Address Form ──────────────────────────────────────────────────────────────
const AddrForm = ({onSubmit,onCancel}) => {
  const [f,setF]=useState({name:"",street:"",plz:"",city:"",land:"Deutschland"});
  const [err,setErr]=useState("");
  const IS={width:"100%",padding:"7px 10px",borderRadius:7,border:"0.5px solid #ccc",fontSize:12,boxSizing:"border-box"};
  const submit=()=>{
    if(!f.name||!f.street||!f.plz||!f.city){setErr("Bitte alle Felder ausfüllen.");return;}
    onSubmit(f);
  };
  return (
    <div style={{borderRadius:11,overflow:"hidden",border:"1.5px solid #534AB7",maxWidth:"90%"}}>
      <div style={{padding:"9px 12px",background:"#EEEDFE",color:"#3C3489",fontSize:12,fontWeight:500}}>📍 Vollständige Lieferadresse eingeben</div>
      <div style={{padding:12,background:"white",display:"flex",flexDirection:"column",gap:7}}>
        {[["Empfänger / Firma","name","Mustermann GmbH"],["Straße & Nr.","street","Musterstraße 12"]].map(([l,k,p])=>(
          <div key={k}><div style={{fontSize:11,color:"#888",marginBottom:3}}>{l}</div>
          <input value={f[k]} onChange={e=>setF(p2=>({...p2,[k]:e.target.value}))} placeholder={p} style={IS}/></div>
        ))}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
          <div><div style={{fontSize:11,color:"#888",marginBottom:3}}>PLZ</div><input value={f.plz} onChange={e=>setF(p=>({...p,plz:e.target.value}))} placeholder="80331" maxLength={5} style={IS}/></div>
          <div><div style={{fontSize:11,color:"#888",marginBottom:3}}>Stadt</div><input value={f.city} onChange={e=>setF(p=>({...p,city:e.target.value}))} placeholder="München" style={IS}/></div>
        </div>
        <div><div style={{fontSize:11,color:"#888",marginBottom:3}}>Land</div><input value={f.land} onChange={e=>setF(p=>({...p,land:e.target.value}))} style={IS}/></div>
        {err&&<div style={{fontSize:11,color:"#A32D2D"}}>{err}</div>}
      </div>
      <div style={{padding:"8px 12px",background:"#f8f8f7",display:"flex",gap:6,borderTop:"0.5px solid #eee"}}>
        <Btn primary small onClick={submit}>✓ Bestätigen & speichern</Btn>
        <Btn small onClick={onCancel}>Abbrechen</Btn>
      </div>
    </div>
  );
};

// ── Chat View ─────────────────────────────────────────────────────────────────
const ChatView = ({currentUser,allUsers,isAdmin}) => {
  const [messages,setMessages]=useState({});
  const [typing,setTyping]=useState(false);
  const [input,setInput]=useState("");
  const [activeChatUser,setActiveChatUser]=useState(allUsers.find(u=>!u.admin)||allUsers[0]);
  const [syncState,setSyncState]=useState({running:false,remaining:600,attempts:0});
  const syncRef=useRef(null);
  const bottomRef=useRef(null);

  const userId=isAdmin?activeChatUser?.id:currentUser.id;
  const getMsgs=useCallback((uid)=>messages[uid]||[],[messages]);
  const addMsg=useCallback((msg,uid2)=>setMessages(p=>({...p,[uid2||userId]:[...(p[uid2||userId]||[]),msg]})),[userId]);

  useEffect(()=>{bottomRef.current?.scrollIntoView({behavior:"smooth"});},[messages,typing,activeChatUser]);

  useEffect(()=>{
    if(!messages[userId]||messages[userId].length===0){
      setTimeout(()=>addMsg({id:uid(),from:"bot",text:`Hallo ${currentUser.name.split(" ")[0]}! Ich bin der Altruan Assistent. Wie kann ich dir helfen?`,time:now()},userId),500);
    }
  },[currentUser.id]); // eslint-disable-line

  // Sync timer
  useEffect(()=>{
    if(!syncState.running)return;
    if(syncRef.current)clearInterval(syncRef.current);
    syncRef.current=setInterval(()=>{
      setSyncState(prev=>{
        if(prev.remaining<=1){
          clearInterval(syncRef.current);
          const att=prev.attempts+1;
          setTimeout(()=>{
            if(att>=2){
              addMsg({id:uid(),from:"bot",time:now(),card:{color:{bg:"#FCEBEB",text:"#791F1F",border:"#F09595",strong:"#A32D2D"},icon:"🎫",title:"Jira TK-2045 erstellt – Sync Fehler",rows:[["Ticket","TK-2045","red"],["Priorität","Hoch","red"],["Zugewiesen","DevOps-Team",""],["Status","Offen","amber"]]}},userId);
              addMsg({id:uid(),from:"bot",text:"Nach 2 Fehlversuchen wurde Jira-Ticket TK-2045 erstellt und dem DevOps-Team zugewiesen.",time:now()},userId);
            }else{
              addMsg({id:uid(),from:"bot",time:now(),card:{color:{bg:"#EAF3DE",text:"#27500A",border:"#97C459",strong:"#3B6D11"},icon:"✅",title:"Sync erfolgreich",rows:[["Datensätze","47 / 47","green"],["Dauer","11 Sekunden",""],["Fehler","0","green"],["Nächster Sync","In 3 Minuten",""]]}},userId);
              addMsg({id:uid(),from:"bot",text:"Sync erfolgreich. Alle 47 Datensätze übertragen.",time:now()},userId);
            }
          },600);
          return{...prev,running:false,remaining:600,attempts:att};
        }
        return{...prev,remaining:prev.remaining-1};
      });
    },1000);
    return()=>clearInterval(syncRef.current);
  },[syncState.running,userId]); // eslint-disable-line

  // EAN form handlers
  const handleEANSubmit=(e1,e2)=>{
    setMessages(p=>({...p,[userId]:(p[userId]||[]).filter(m=>!m.form)}));
    addMsg({id:uid(),from:"user",text:`EAN WC-00441: ${e1}  ·  WC-00519: ${e2}`,time:now(),userId:currentUser.id},userId);
    setTyping(true);
    setTimeout(()=>{
      setTyping(false);
      addMsg({id:uid(),from:"bot",time:now(),card:{color:{bg:"#EAF3DE",text:"#27500A",border:"#97C459",strong:"#3B6D11"},icon:"✅",title:"Stammdaten aktualisiert – Sync erfolgreich",rows:[["EAN WC-00441",e1,"green"],["EAN WC-00519",e2,"green"],["Weclapp","Aktualisiert","green"],["Pulpo Transfer","12 / 12 Pos.","green"],["Lieferschein P91111","Verfügbar","green"]]}},userId);
      addMsg({id:uid(),from:"bot",text:"EAN gespeichert und Sync sofort ausgeführt. Bestellung P91111 vollständig in Pulpo übertragen.",time:now()},userId);
    },1800);
  };

  const handleEANCancel=(act)=>{
    setMessages(p=>({...p,[userId]:(p[userId]||[]).filter(m=>!m.form)}));
    if(act==="jira"){
      setTyping(true);
      setTimeout(()=>{
        setTyping(false);
        addMsg({id:uid(),from:"bot",time:now(),card:{color:{bg:"#FCEBEB",text:"#791F1F",border:"#F09595",strong:"#A32D2D"},icon:"🎫",title:"Jira TK-2044 erstellt",rows:[["Ticket","TK-2044","red"],["Priorität","Mittel","amber"],["Zugewiesen","Stammdaten-Team",""],["P91111","Blockiert bis Lösung","amber"]]}},userId);
        addMsg({id:uid(),from:"bot",text:"Ticket TK-2044 erstellt. Du bekommst eine Meldung sobald die EAN gepflegt wurde.",time:now()},userId);
      },1400);
    }else addMsg({id:uid(),from:"bot",text:"Abgebrochen. Schreib mir wenn du weitere Hilfe benötigst.",time:now()},userId);
  };

  const handleAddrSubmit=(addr)=>{
    setMessages(p=>({...p,[userId]:(p[userId]||[]).filter(m=>!m.form)}));
    addMsg({id:uid(),from:"user",text:`${addr.name}, ${addr.street}, ${addr.plz} ${addr.city}, ${addr.land}`,time:now(),userId:currentUser.id},userId);
    setTyping(true);
    setTimeout(()=>{
      setTyping(false);
      addMsg({id:uid(),from:"bot",time:now(),card:{color:{bg:"#EAF3DE",text:"#27500A",border:"#97C459",strong:"#3B6D11"},icon:"✅",title:"Adresse gespeichert & Carrier informiert",rows:[["Empfänger",addr.name,"green"],["PLZ / Stadt",`${addr.plz} ${addr.city}`,"green"],["Weclapp","Aktualisiert","green"],["Pulpo","Aktualisiert","green"],["DHL","Informiert","green"]]}},userId);
      addMsg({id:uid(),from:"bot",text:"Adresse korrigiert. DHL wurde automatisch informiert.",time:now()},userId);
    },1800);
  };

  const callClaude=async(text,history)=>{
    const apiKey=localStorage.getItem("altruan_api_key")||"";
    const msgs=[
      ...history.slice(-12).map(m=>({role:m.from==="user"?"user":"assistant",content:m.text||(m.card?`[Karte: ${m.card.title}]`:"[Formular]")})).filter(m=>m.content&&m.content.trim()),
      {role:"user",content:text}
    ];
    const resp=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",headers:{"Content-Type":"application/json",...(apiKey?{"x-api-key":apiKey}:{})},
      body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:800,system:SYSTEM_PROMPT,messages:msgs})
    });
    const data=await resp.json();
    return data.content?.[0]?.text||"Entschuldigung, bitte versuche es erneut.";
  };

  const handleInput=async(text,history)=>{
    const t=text.toLowerCase();
    const delay=ms=>new Promise(r=>setTimeout(r,ms));

    // EAN / P91111
    if(t.includes("p91111")||(t.includes("ean")&&(t.includes("fehlt")||t.includes("fehlen")))||(t.includes("nicht")&&t.includes("pulpo"))){
      setTyping(true);await delay(900);setTyping(false);
      addMsg({id:uid(),from:"bot",time:now(),card:{color:{bg:"#E6F1FB",text:"#0C447C",border:"#85B7EB",strong:"#185FA5"},icon:"🔍",title:"Diagnose – Bestellung P91111",rows:[["Weclapp","Freigegeben","green"],["Pulpo Transfer","3× Fehlgeschlagen","red"],["Positionen","12 Artikel",""],["Letzte Meldung","Heute 07:18 Uhr",""]]}},userId);
      await delay(300);setTyping(true);await delay(1200);setTyping(false);
      addMsg({id:uid(),from:"bot",time:now(),card:{color:{bg:"#FCEBEB",text:"#791F1F",border:"#F09595",strong:"#A32D2D"},icon:"⚠️",title:"Ursache: fehlende EAN-Stammdaten",rows:[["Fehlertyp","Fehlende EAN-Nummer","red"],["Artikel 1","Schreibtischlampe LED Pro (WC-00441)","red"],["Artikel 2","USB-C Hub 7-Port (WC-00519)","red"],["Auswirkung","Transfer blockiert","amber"]]}},userId);
      setTyping(true);await delay(900);setTyping(false);
      addMsg({id:uid(),from:"bot",text:"2 Artikel haben keine EAN in den Weclapp-Stammdaten. Hast du die Nummern zur Hand?",time:now(),form:"ean"},userId);
      return;
    }

    // Adressfehler
    if((t.includes("adresse")&&(t.includes("fehler")||t.includes("falsch")))||t.includes("adressfehler")||t.includes("4821")||(t.includes("plz")&&t.includes("falsch"))){
      setTyping(true);await delay(900);setTyping(false);
      addMsg({id:uid(),from:"bot",text:"Adressfehler erkannt. Bitte gib die vollständige korrekte Lieferadresse ein.",time:now(),form:"address"},userId);
      return;
    }

    // Sync
    if(t.includes("sync")||t.includes("synchron")){
      if(syncState.running){
        setTyping(true);await delay(800);setTyping(false);
        addMsg({id:uid(),from:"bot",text:`Sync läuft bereits – nächster Zyklus in ${Math.floor(syncState.remaining/60)}:${String(syncState.remaining%60).padStart(2,"0")} Min.`,time:now()},userId);
        return;
      }
      setTyping(true);await delay(900);setTyping(false);
      addMsg({id:uid(),from:"bot",text:"Sync-Überwachung gestartet. Ich melde mich nach dem nächsten Zyklus.",time:now()},userId);
      setSyncState(p=>({...p,running:true,remaining:30}));
      return;
    }

    // Claude API
    setTyping(true);
    try{
      const reply=await callClaude(text,history);
      setTyping(false);
      addMsg({id:uid(),from:"bot",text:reply,time:now()},userId);
    }catch(e){
      setTyping(false);
      addMsg({id:uid(),from:"bot",text:`Verbindungsfehler. Bitte API-Key in den Einstellungen prüfen.`,time:now()},userId);
    }
  };

  async function send(){
    const text=input.trim();
    if(!text||typing)return;
    setInput("");
    const history=getMsgs(userId);
    addMsg({id:uid(),from:"user",text,time:now(),userId:currentUser.id},userId);
    await handleInput(text,history);
  }

  const chatMsgs=getMsgs(userId);
  const syncMin=Math.floor(syncState.remaining/60);
  const syncSec=String(syncState.remaining%60).padStart(2,"0");

  return (
    <div style={{display:"flex",flexDirection:"column",height:"100%"}}>
      {syncState.running&&(
        <div style={{background:"#E6F1FB",borderBottom:"0.5px solid #B5D4F4",padding:"5px 14px",fontSize:11,color:"#0C447C",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span>🔄 Sync läuft – nächster Zyklus in <strong>{syncMin}:{syncSec}</strong></span>
          <div style={{width:70,height:3,background:"#B5D4F4",borderRadius:2,overflow:"hidden"}}>
            <div style={{width:`${Math.round((600-syncState.remaining)/600*100)}%`,height:"100%",background:"#185FA5",transition:"width 1s"}}/>
          </div>
        </div>
      )}

// ── Customer Chat ─────────────────────────────────────────────────────────────
const CustomerChat = ({onBack}) => {
  const [step,setStep]=useState("select"); // select | angebot-form | verify | ticket-confirm | chat
  const [mode,setMode]=useState(null);
  const [verified,setVerified]=useState(null);
  const [ticket,setTicket]=useState(null);
  const [msgs,setMsgs]=useState([]);
  const [input,setInput]=useState("");
  const [typing,setTyping]=useState(false);
  const bottomRef=useRef(null);

  useEffect(()=>{bottomRef.current?.scrollIntoView({behavior:"smooth"});},[msgs,typing]);

  useEffect(()=>{
    if(step==="chat"&&msgs.length===0){
      const greeting=mode==="angebot"&&ticket
        ?`Hallo ${ticket.name.split(" ")[0]}! Anfrage ${ticket.nr} wurde erfasst. Hast du weitere Fragen?`
        :verified?`Hallo ${verified.name.split(" ")[0]}! Bestellung ${verified.orderNr} gefunden. Wie kann ich helfen?`:"Hallo! Wie kann ich helfen?";
      setTimeout(()=>setMsgs([{id:uid(),from:"bot",text:greeting,time:now()}]),400);
    }
  },[step]); // eslint-disable-line

  const CUST_PROMPT=`Du bist der Altruan Kunden-Assistent. Antworte auf Deutsch, freundlich und empathisch.
${verified?`Kunde: ${verified.name}\nBestellung: ${verified.orderNr}\nArtikel: ${verified.items}\nStatus: ${verified.status}\nCarrier: ${verified.carrier}\nTracking: ${verified.tracking}\nETA: ${verified.eta}`:""}
${ticket?`Ticket: ${ticket.nr}\nArtikel: ${ticket.artikel}\nMenge: ${ticket.menge}`:""}`;

  const send=async()=>{
    const text=input.trim();if(!text||typing)return;
    setInput("");
    const history=[...msgs];
    setMsgs(p=>[...p,{id:uid(),from:"user",text,time:now()}]);
    setTyping(true);
    try{
      const apiKey=localStorage.getItem("altruan_api_key")||"";
      const resp=await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",headers:{"Content-Type":"application/json",...(apiKey?{"x-api-key":apiKey}:{})},
        body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:600,system:CUST_PROMPT,
          messages:[...history.slice(-10).map(m=>({role:m.from==="user"?"user":"assistant",content:m.text||""})).filter(m=>m.content.trim()),{role:"user",content:text}]})
      });
      const data=await resp.json();
      setTyping(false);
      setMsgs(p=>[...p,{id:uid(),from:"bot",text:data.content?.[0]?.text||"Bitte versuche es erneut.",time:now()}]);
    }catch{
      setTyping(false);
      setMsgs(p=>[...p,{id:uid(),from:"bot",text:"Verbindungsfehler – bitte erneut versuchen.",time:now()}]);
    }
  };

  // Angebot form
  const [af,setAf]=useState({name:"",email:"",phone:"",artikel:"",menge:""});
  const [afErr,setAfErr]=useState("");
  const submitAngebot=()=>{
    if(!af.name||!af.email||!af.phone||!af.artikel||!af.menge){setAfErr("Bitte alle Felder ausfüllen.");return;}
    if(!/\S+@\S+\.\S+/.test(af.email)){setAfErr("Ungültige E-Mail.");return;}
    setTicket({nr:`ANG-${1000+Math.floor(Math.random()*999)}`,...af,created:new Date().toLocaleDateString("de-DE")});
    setStep("ticket-confirm");
  };

  // Verify form
  const [vf,setVf]=useState({order:"",email:""});
  const [vErr,setVErr]=useState("");const [vLoad,setVLoad]=useState(false);
  const verify=()=>{
    setVErr("");
    const key=vf.order.trim().toUpperCase();const em=vf.email.trim().toLowerCase();
    const found=MOCK_ORDERS[key];
    if(!found){setVErr("Bestellnummer nicht gefunden.");return;}
    if(found.email.toLowerCase()!==em){setVErr("E-Mail stimmt nicht überein.");return;}
    setVLoad(true);setTimeout(()=>{setVLoad(false);setVerified({orderNr:key,...found});setStep("chat");},1000);
  };

  const IS={width:"100%",padding:"9px 12px",borderRadius:9,border:"1.5px solid #e0dfd8",fontSize:13,fontFamily:"inherit",outline:"none",boxSizing:"border-box",marginBottom:10};

  return(
    <div style={{display:"flex",flexDirection:"column",height:"100%",background:"white"}}>
      <div style={{background:TP,padding:"11px 14px",display:"flex",alignItems:"center",gap:10,flexShrink:0}}>
        <button onClick={onBack} style={{background:"rgba(255,255,255,.15)",border:"none",borderRadius:6,padding:"3px 8px",color:"white",fontSize:11,cursor:"pointer"}}>← Zurück</button>
        <div style={{width:30,height:30,borderRadius:"50%",background:"#EEEDFE",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,flexShrink:0}}>🤖</div>
        <div>
          <div style={{fontSize:13,fontWeight:500,color:"white"}}>Altruan Kundenservice</div>
          <div style={{fontSize:10,color:"rgba(255,255,255,.7)",display:"flex",alignItems:"center",gap:4}}>
            <span style={{width:5,height:5,borderRadius:"50%",background:"#4ade80",display:"inline-block"}}/>Online
          </div>
        </div>
      </div>

      {step==="select"&&(
        <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24}}>
          <div style={{fontSize:22,marginBottom:10}}>🤖</div>
          <div style={{fontSize:16,fontWeight:500,color:"#222",marginBottom:6}}>Wie können wir helfen?</div>
          <div style={{fontSize:13,color:"#888",marginBottom:22,textAlign:"center"}}>Bitte wähle eine Option</div>
          <div style={{width:"100%",maxWidth:320,display:"flex",flexDirection:"column",gap:10}}>
            {[["📋","Anfrage Angebot","Ich möchte ein Angebot anfragen","#EAF3DE","angebot"],["📦","Anfrage Auftrag","Ich habe eine bestehende Bestellung","#E6F1FB","auftrag"]].map(([ico,t,d,bg,m])=>(
              <button key={m} onClick={()=>{setMode(m);setStep(m==="angebot"?"angebot-form":"verify");}}
                style={{width:"100%",padding:"14px 16px",borderRadius:11,border:"1.5px solid #e0dfd8",background:"white",cursor:"pointer",textAlign:"left",fontFamily:"inherit",display:"flex",alignItems:"center",gap:12}}>
                <div style={{width:36,height:36,borderRadius:9,background:bg,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>{ico}</div>
                <div><div style={{fontSize:14,fontWeight:500,color:"#222"}}>{t}</div><div style={{fontSize:12,color:"#888"}}>{d}</div></div>
                <span style={{marginLeft:"auto",color:"#ccc"}}>›</span>
              </button>
            ))}
          </div>
        </div>
      )}

      {step==="angebot-form"&&(
        <div style={{flex:1,overflowY:"auto",padding:20}}>
          <button onClick={()=>setStep("select")} style={{background:"none",border:"none",cursor:"pointer",color:"#888",fontSize:13,padding:0,marginBottom:14,fontFamily:"inherit"}}>← Zurück</button>
          <div style={{fontSize:15,fontWeight:500,marginBottom:16}}>📋 Anfrage Angebot</div>
          {[["Name","name","Vor- und Nachname","text"],["E-Mail","email","deine@email.de","email"],["Telefon","phone","+49 89 123456","tel"],["Artikel","artikel","Artikelname oder Nummer","text"],["Menge","menge","z.B. 50 Stück","text"]].map(([l,k,p,type])=>(
            <div key={k}><div style={{fontSize:12,color:"#555",marginBottom:4,fontWeight:500}}>{l}</div>
            <input type={type} value={af[k]} onChange={e=>setAf(p2=>({...p2,[k]:e.target.value}))} placeholder={p}
              style={{...IS,marginBottom:10,borderColor:afErr&&!af[k]?"#E24B4A":"#e0dfd8"}}/></div>
          ))}
          {afErr&&<div style={{fontSize:12,color:"#A32D2D",marginBottom:10}}>{afErr}</div>}
          <Btn primary onClick={submitAngebot}>Anfrage absenden →</Btn>
        </div>
      )}

      {step==="verify"&&(
        <div style={{flex:1,overflowY:"auto",padding:20}}>
          <button onClick={()=>setStep("select")} style={{background:"none",border:"none",cursor:"pointer",color:"#888",fontSize:13,padding:0,marginBottom:14,fontFamily:"inherit"}}>← Zurück</button>
          <div style={{fontSize:15,fontWeight:500,marginBottom:16}}>📦 Anfrage Auftrag</div>
          <div style={{fontSize:12,color:"#555",marginBottom:4,fontWeight:500}}>Bestellnummer</div>
          <input value={vf.order} onChange={e=>setVf(p=>({...p,order:e.target.value}))} placeholder="z.B. ORD-10042"
            style={{...IS,fontFamily:"monospace",borderColor:vErr?"#E24B4A":"#e0dfd8"}}/>
          <div style={{fontSize:12,color:"#555",marginBottom:4,fontWeight:500}}>E-Mail-Adresse</div>
          <input type="email" value={vf.email} onChange={e=>setVf(p=>({...p,email:e.target.value}))} placeholder="deine@email.de"
            style={{...IS,borderColor:vErr?"#E24B4A":"#e0dfd8"}}/>
          {vErr&&<div style={{fontSize:12,color:"#A32D2D",marginBottom:8}}>{vErr}</div>}
          <Btn primary onClick={verify} disabled={vLoad||!vf.order||!vf.email}>{vLoad?"Wird geprüft…":"Weiter →"}</Btn>
          <div style={{marginTop:14,background:"#f8f8f7",borderRadius:8,padding:"9px 11px",fontSize:11,color:"#888"}}>
            <strong style={{color:"#666"}}>Test:</strong> ORD-10042 · jonas.puettmann@altruan.de
          </div>
        </div>
      )}

      {step==="ticket-confirm"&&ticket&&(
        <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:20}}>
          <div style={{fontSize:28,marginBottom:10}}>✅</div>
          <div style={{fontSize:16,fontWeight:500,color:"#222",marginBottom:6}}>Anfrage eingegangen!</div>
          <div style={{fontSize:13,color:"#888",textAlign:"center",marginBottom:18,lineHeight:1.6}}>Unser Vertriebsteam meldet sich innerhalb von 1 Werktag.</div>
          <div style={{width:"100%",maxWidth:300,background:"#f8f8f7",borderRadius:10,overflow:"hidden",border:"0.5px solid #e8e8e5",marginBottom:16}}>
            <div style={{background:TP,padding:"8px 13px",fontSize:12,fontWeight:500,color:"#EEEDFE",display:"flex",justifyContent:"space-between"}}><span>📋 Ticket</span><span>{ticket.nr}</span></div>
            {[["Name",ticket.name],["E-Mail",ticket.email],["Artikel",ticket.artikel],["Menge",ticket.menge]].map(([k,v])=>(
              <div key={k} style={{display:"flex",justifyContent:"space-between",fontSize:12,padding:"6px 13px",borderBottom:"0.5px solid #eee"}}>
                <span style={{color:"#888"}}>{k}</span><span style={{fontWeight:500}}>{v}</span>
              </div>
            ))}
          </div>
          <Btn primary onClick={()=>setStep("chat")}>Weitere Fragen →</Btn>
        </div>
      )}

      {step==="chat"&&(
        <>
          <div style={{flex:1,overflowY:"auto",padding:14,display:"flex",flexDirection:"column",gap:8}}>
            {msgs.map(m=>{
              const isMe=m.from==="user";
              return(<div key={m.id} style={{display:"flex",gap:7,alignItems:"flex-end",flexDirection:isMe?"row-reverse":"row"}}>
                {!isMe&&<div style={{width:24,height:24,borderRadius:"50%",background:"#EEEDFE",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,flexShrink:0}}>🤖</div>}
                <div style={{borderRadius:11,padding:"8px 12px",fontSize:13,lineHeight:1.5,maxWidth:"78%",...(isMe?{background:TP,color:"white",borderBottomRightRadius:3}:{background:"#f1f0eb",border:"0.5px solid #e0dfd8",borderBottomLeftRadius:3,color:"#222"})}}>{m.text}</div>
              </div>);
            })}
            {typing&&<div style={{display:"flex",gap:7,alignItems:"flex-end"}}>
              <div style={{width:24,height:24,borderRadius:"50%",background:"#EEEDFE",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12}}>🤖</div>
              <div style={{background:"#f1f0eb",border:"0.5px solid #e0dfd8",borderRadius:11,borderBottomLeftRadius:3,padding:"8px 12px",display:"flex",gap:4}}>
                {[0,150,300].map(d=><div key={d} style={{width:5,height:5,borderRadius:"50%",background:"#aaa",animation:`bounce .9s ${d}ms infinite`}}/>)}
              </div>
            </div>}
            <div ref={bottomRef}/>
          </div>
          <div style={{padding:"10px 14px",borderTop:"0.5px solid #eee",display:"flex",gap:8}}>
            <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&send()} placeholder="Deine Frage..."
              style={{flex:1,padding:"8px 13px",borderRadius:18,border:"1px solid #e0dfd8",fontSize:13,fontFamily:"inherit",outline:"none",background:"#f8f8f7"}}/>
            <button onClick={send} disabled={!input.trim()||typing} style={{width:32,height:32,borderRadius:"50%",background:input.trim()&&!typing?TP:"#ccc",border:"none",cursor:input.trim()&&!typing?"pointer":"default",color:"white",fontSize:13}}>➤</button>
          </div>
          <div style={{padding:"4px 14px 8px",textAlign:"center",fontSize:10,color:"#ccc"}}>Gesichert · Nur deine Bestellung sichtbar · Altruan GmbH</div>
        </>
      )}
    </div>
  );
};

// ── App ───────────────────────────────────────────────────────────────────────
const NAV=[
  {id:"chat",   label:"Chat",              icon:"💬"},
  {id:"dashboard",label:"Dashboard",       icon:"📊"},
  {id:"customer",label:"Kunden-Chat",      icon:"🛍"},
  {id:"apis",   label:"API-Schnittstellen",icon:"🔌",adminOnly:true},
  {id:"settings",label:"Einstellungen",    icon:"⚙️"},
];

export default function App(){
  const [view,setView]=useState("chat");
  const [currentUser,setCurrentUser]=useState(USERS[0]);

  return(
    <div style={{display:"grid",gridTemplateColumns:"200px 1fr",height:"100vh",background:"white",fontFamily:"system-ui,-apple-system,'Segoe UI',sans-serif"}}>
      <div style={{background:"#f8f8f7",borderRight:"0.5px solid #e8e8e5",display:"flex",flexDirection:"column"}}>
        <div style={{padding:"14px 16px",borderBottom:"0.5px solid #e8e8e5",display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:30,height:30,background:TP,borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16}}>🤖</div>
          <div><div style={{fontSize:13,fontWeight:500}}>Bot Manager</div><div style={{fontSize:10,color:"#aaa"}}>Altruan KI-System</div></div>
        </div>

        <div style={{padding:"10px 14px",borderBottom:"0.5px solid #e8e8e5"}}>
          <div style={{fontSize:10,color:"#aaa",marginBottom:5}}>Angemeldet als:</div>
          <select value={currentUser.id} onChange={e=>setCurrentUser(USERS.find(u=>u.id===parseInt(e.target.value)))}
            style={{width:"100%",padding:"5px 8px",borderRadius:7,border:"0.5px solid #ccc",fontSize:11,background:"white"}}>
            {USERS.map(u=><option key={u.id} value={u.id}>{u.name}</option>)}
          </select>
        </div>

        <div style={{flex:1,padding:"6px 0"}}>
          <div style={{fontSize:10,fontWeight:500,color:"#aaa",textTransform:"uppercase",letterSpacing:".06em",padding:"8px 16px 4px"}}>Navigation</div>
          {NAV.filter(n=>!n.adminOnly||currentUser.admin).map(n=>(
            <div key={n.id} onClick={()=>setView(n.id)} style={{padding:"9px 16px",cursor:"pointer",fontSize:13,display:"flex",alignItems:"center",gap:8,borderLeft:view===n.id?"2px solid #534AB7":"2px solid transparent",background:view===n.id?"white":"transparent",color:view===n.id?"#333":"#666",fontWeight:view===n.id?500:400,userSelect:"none"}}>
              <span>{n.icon}</span>{n.label}
              {n.adminOnly&&<span style={{fontSize:10,background:"#EEEDFE",color:"#534AB7",padding:"2px 6px",borderRadius:4,marginLeft:"auto"}}>Admin</span>}
            </div>
          ))}
        </div>

        <div style={{padding:"12px 14px",borderTop:"0.5px solid #e8e8e5",display:"flex",alignItems:"center",gap:8}}>
          <Av init={currentUser.init} bg={currentUser.bg} tc={currentUser.tc} size={28}/>
          <div><div style={{fontSize:12,fontWeight:500}}>{currentUser.name}</div><div style={{fontSize:10,color:"#aaa"}}>{currentUser.role}</div></div>
        </div>
      </div>

      <div style={{display:"flex",flexDirection:"column",minWidth:0}}>
        <div style={{padding:"11px 18px",borderBottom:"0.5px solid #e8e8e5",display:"flex",alignItems:"center",justifyContent:"space-between",background:"white"}}>
          <div>
            <div style={{fontSize:15,fontWeight:500,color:"#333"}}>{{chat:"💬 Altruan Assistent",dashboard:"📊 Dashboard",customer:"🛍 Kunden-Chat",apis:"🔌 API-Schnittstellen",settings:"⚙️ Einstellungen"}[view]}</div>
            <div style={{fontSize:11,color:"#aaa"}}>{{chat:"Privater Chat · vertraulich",dashboard:"Ticket-Übersicht & Statistiken",customer:"Kunden-Portal",apis:"Schnittstellen verwalten",settings:"Bot-Konfiguration"}[view]}</div>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <div style={{width:8,height:8,borderRadius:"50%",background:"#639922"}}/>
            <span style={{fontSize:11,color:"#888"}}>Systeme verbunden</span>
          </div>
        </div>

        <div style={{flex:1,minHeight:0,overflow:"hidden"}}>
          {view==="chat"&&<ChatView currentUser={currentUser} allUsers={USERS} isAdmin={currentUser.admin}/>}
          {view==="dashboard"&&<Dashboard/>}
          {view==="customer"&&<CustomerChat onBack={()=>setView("chat")}/>}
          {view==="apis"&&(currentUser.admin?<APIManager/>:
            <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100%",flexDirection:"column",gap:8,color:"#aaa"}}>
              <span style={{fontSize:32}}>🔒</span><span style={{fontSize:14}}>Admin-Berechtigung erforderlich</span>
            </div>
          )}
          {view==="settings"&&<Settings/>}
        </div>
      </div>
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
</html>
