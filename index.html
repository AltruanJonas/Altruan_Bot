<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Altruan Bot Manager</title>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
body{background:#f0efeb;height:100vh;overflow:hidden}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}
input,select,button{font-family:inherit}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:#ddd;border-radius:2px}
</style>
</head>
<body>
<div id="root" style="height:100vh"></div>
<script>
const e = React.createElement;
const {useState, useEffect, useRef, useCallback} = React;

const TP = "#464775";
const USERS = [
  {id:1,init:"TG",name:"Tobias Gumtow",role:"Leiter Logistik",admin:false,bg:"#CECBF6",tc:"#3C3489"},
  {id:2,init:"NB",name:"Nina Becker",role:"Sachbearbeiterin",admin:false,bg:"#9FE1CB",tc:"#085041"},
  {id:3,init:"LF",name:"Lars Fischer",role:"Lagerist",admin:false,bg:"#B5D4F4",tc:"#0C447C"},
  {id:4,init:"AD",name:"Admin",role:"Vollzugriff",admin:true,bg:"#D3D1C7",tc:"#444441"},
  {id:5,init:"JP",name:"Jonas Püttmann",role:"Administrator",admin:true,bg:"#CECBF6",tc:"#3C3489"},
];

const DEFAULT_APIS = [
  {id:1,name:"Salesforce",cat:"CRM",key:"sf_••••••2b19",env:"prod",status:"active"},
  {id:2,name:"Zendesk",cat:"Ticketing",key:"zd_••••••5e72",env:"prod",status:"warn"},
  {id:3,name:"Jira",cat:"Ticketing",key:"jira_••••7d88",env:"prod",status:"active"},
  {id:4,name:"Weclapp",cat:"ERP",key:"wc_••••••3f2a",env:"prod",status:"active"},
  {id:5,name:"Pulpo WMS",cat:"WMS",key:"pu_••••••9c41",env:"prod",status:"active"},
  {id:6,name:"DHL",cat:"Carrier",key:"dhl_•••••4a03",env:"prod",status:"active"},
  {id:7,name:"DB Schenker",cat:"Carrier",key:"— ausstehend",env:"prod",status:"inactive"},
  {id:8,name:"Microsoft Teams",cat:"Messaging",key:"az_••••••7b25",env:"stage",status:"warn"},
  {id:9,name:"Shopify",cat:"Shop",key:"— ausstehend",env:"prod",status:"inactive"},
  {id:10,name:"Miracle",cat:"Marktplatz",key:"— ausstehend",env:"prod",status:"inactive"},
];

const MOCK_ORDERS = {
  "ORD-10042":{email:"jonas.puettmann@altruan.de",name:"Jonas Püttmann",items:"Schreibtischlampe LED Pro × 2",status:"Versandt",carrier:"DHL",tracking:"1234567890",eta:"Morgen bis 18 Uhr"},
  "TEST-0001":{email:"test@test.de",name:"Test Kunde",items:"Testartikel × 1",status:"Versandt",carrier:"DHL",tracking:"9876543210",eta:"Übermorgen"},
};

const SYS = `Du bist der Altruan Assistent – KI-Logistik-Assistent. Antworte auf Deutsch, präzise, freundlich.
Systeme: Weclapp (ERP), Pulpo WMS, Jira, Zendesk, Salesforce, DHL, DB Schenker, Shopify, Miracle, Teams.
Sync: Lieferungen 3 Min · Bestellungen 20 Min · Produkte 60 Min. Nach 2 Sync-Fehlern → Jira-Ticket.
Bei Adressfehlern: vollständige Adresse anfordern. Kurz und direkt antworten.`;

const tnow = () => { const d=new Date(); return d.getHours()+":"+String(d.getMinutes()).padStart(2,"0"); };
const uid = () => Date.now()+Math.random();
const delay = ms => new Promise(r => setTimeout(r, ms));

// ── helpers ──────────────────────────────────────────────────────────────────
function s(...args) {
  let out = {};
  for (const a of args) if (a) Object.assign(out, a);
  return out;
}

const Av = ({init,bg,tc,size=32,online=false}) =>
  e("div",{style:{position:"relative",flexShrink:0}},
    e("div",{style:{width:size,height:size,borderRadius:"50%",background:bg,color:tc,display:"flex",alignItems:"center",justifyContent:"center",fontSize:Math.round(size*.34),fontWeight:500}},init),
    online && e("div",{style:{width:9,height:9,borderRadius:"50%",background:"#639922",position:"absolute",bottom:0,right:0,border:"2px solid white"}})
  );

const Btn = ({children,primary,danger,onClick,small,disabled}) =>
  e("button",{onClick,disabled,style:{fontSize:small?11:12,padding:small?"4px 10px":"7px 14px",borderRadius:7,border:`0.5px solid ${primary?"#534AB7":danger?"#E24B4A":"#ccc"}`,background:primary?"#534AB7":danger?"#FCEBEB":"white",color:primary?"#EEEDFE":danger?"#A32D2D":"#444",cursor:disabled?"default":"pointer",opacity:disabled?.5:1,display:"inline-flex",alignItems:"center",gap:5}},children);

const Tag = ({children,bg,color}) =>
  e("span",{style:{fontSize:10,padding:"2px 7px",borderRadius:4,background:bg,color,fontWeight:500}},children);

function InfoCard({color,icon,title,rows}) {
  return e("div",{style:{borderRadius:10,overflow:"hidden",border:`0.5px solid ${color.border}`,borderLeft:`3px solid ${color.strong}`,maxWidth:"88%",background:"white"}},
    e("div",{style:{padding:"8px 12px",background:color.bg,color:color.text,fontSize:12,fontWeight:500}},icon+" "+title),
    e("div",{style:{background:"#f8f8f7",padding:"7px 12px"}},
      rows.map((r,i) =>
        e("div",{key:i,style:{display:"flex",justifyContent:"space-between",fontSize:11,padding:"3px 0",borderBottom:i<rows.length-1?"0.5px solid #eee":"none"}},
          e("span",{style:{color:"#888"}},r[0]),
          e("span",{style:{fontWeight:500,color:r[2]==="red"?"#A32D2D":r[2]==="green"?"#3B6D11":r[2]==="amber"?"#854F0B":"#333"}},r[1])
        )
      )
    )
  );
}

const TypingBubble = () =>
  e("div",{style:{display:"flex",gap:8,alignItems:"flex-end"}},
    e(Av,{init:"AA",bg:"#EEEDFE",tc:"#534AB7",size:26}),
    e("div",{style:{background:"#f1f0eb",border:"0.5px solid #e0dfd8",borderRadius:11,borderBottomLeftRadius:3,padding:"9px 12px",display:"flex",gap:4}},
      [0,150,300].map(d=>e("div",{key:d,style:{width:5,height:5,borderRadius:"50%",background:"#aaa",animation:`bounce .9s ${d}ms infinite`}}))
    )
  );

// ── Chat ──────────────────────────────────────────────────────────────────────
function ChatView({currentUser,allUsers,isAdmin}) {
  const [messages,setMessages] = useState({});
  const [typing,setTyping] = useState(false);
  const [input,setInput] = useState("");
  const [activeUser,setActiveUser] = useState(allUsers.find(u=>!u.admin)||allUsers[0]);
  const [syncState,setSyncState] = useState({running:false,remaining:600,attempts:0});
  const syncRef = useRef(null);
  const bottomRef = useRef(null);
  const uid2 = isAdmin ? activeUser?.id : currentUser.id;

  const getMsgs = useCallback(id => messages[id]||[], [messages]);
  const addMsg = useCallback((msg, id) =>
    setMessages(p => ({...p, [id||uid2]: [...(p[id||uid2]||[]), msg]}))
  , [uid2]);

  useEffect(() => { bottomRef.current?.scrollIntoView({behavior:"smooth"}); }, [messages,typing,activeUser]);

  useEffect(() => {
    const id = currentUser.id;
    if (!messages[id] || !messages[id].length) {
      setTimeout(() => addMsg({id:uid(),from:"bot",text:`Hallo ${currentUser.name.split(" ")[0]}! Ich bin der Altruan Assistent. Wie kann ich dir helfen?`,time:tnow()}, id), 500);
    }
  }, [currentUser.id]); // eslint-disable-line

  useEffect(() => {
    if (!syncState.running) return;
    if (syncRef.current) clearInterval(syncRef.current);
    syncRef.current = setInterval(() => {
      setSyncState(prev => {
        if (prev.remaining <= 1) {
          clearInterval(syncRef.current);
          const att = prev.attempts + 1;
          const cid = uid2;
          setTimeout(() => {
            if (att >= 2) {
              addMsg({id:uid(),from:"bot",time:tnow(),card:{color:{bg:"#FCEBEB",text:"#791F1F",border:"#F09595",strong:"#A32D2D"},icon:"🎫",title:"Jira TK-2045 erstellt",rows:[["Ticket","TK-2045","red"],["Priorität","Hoch","red"],["Zugewiesen","DevOps-Team",""],["Status","Offen","amber"]]}}, cid);
              addMsg({id:uid(),from:"bot",text:"Jira TK-2045 erstellt und DevOps-Team zugewiesen.",time:tnow()}, cid);
            } else {
              addMsg({id:uid(),from:"bot",time:tnow(),card:{color:{bg:"#EAF3DE",text:"#27500A",border:"#97C459",strong:"#3B6D11"},icon:"✅",title:"Sync erfolgreich",rows:[["Datensätze","47 / 47","green"],["Dauer","11 Sek",""],["Fehler","0","green"]]}}, cid);
              addMsg({id:uid(),from:"bot",text:"Sync erfolgreich. Alle 47 Datensätze übertragen.",time:tnow()}, cid);
            }
          }, 600);
          return {...prev, running:false, remaining:600, attempts:att};
        }
        return {...prev, remaining:prev.remaining-1};
      });
    }, 1000);
    return () => clearInterval(syncRef.current);
  }, [syncState.running]); // eslint-disable-line

  const resolveEAN = (e1, e2) => {
    setMessages(p => ({...p, [uid2]: (p[uid2]||[]).filter(m => !m.form)}));
    addMsg({id:uid(),from:"user",text:`EAN WC-00441: ${e1} · WC-00519: ${e2}`,time:tnow(),userId:currentUser.id}, uid2);
    setTyping(true);
    setTimeout(() => {
      setTyping(false);
      addMsg({id:uid(),from:"bot",time:tnow(),card:{color:{bg:"#EAF3DE",text:"#27500A",border:"#97C459",strong:"#3B6D11"},icon:"✅",title:"Stammdaten gespeichert – Sync OK",rows:[["EAN 1",e1,"green"],["EAN 2",e2,"green"],["Pulpo Transfer","12/12 Positionen","green"]]}}, uid2);
      addMsg({id:uid(),from:"bot",text:"EAN gespeichert. Bestellung P91111 vollständig in Pulpo übertragen.",time:tnow()}, uid2);
    }, 1800);
  };

  const cancelForm = (act) => {
    setMessages(p => ({...p, [uid2]: (p[uid2]||[]).filter(m => !m.form)}));
    if (act === "jira") {
      setTyping(true);
      setTimeout(() => {
        setTyping(false);
        addMsg({id:uid(),from:"bot",time:tnow(),card:{color:{bg:"#FCEBEB",text:"#791F1F",border:"#F09595",strong:"#A32D2D"},icon:"🎫",title:"Jira TK-2044 erstellt",rows:[["Ticket","TK-2044","red"],["Zugewiesen","Stammdaten-Team",""],["Status","Offen","amber"]]}}, uid2);
      }, 1400);
    } else {
      addMsg({id:uid(),from:"bot",text:"Abgebrochen.",time:tnow()}, uid2);
    }
  };

  const resolveAddr = (addr) => {
    setMessages(p => ({...p, [uid2]: (p[uid2]||[]).filter(m => !m.form)}));
    addMsg({id:uid(),from:"user",text:`${addr.name}, ${addr.street}, ${addr.plz} ${addr.city}`,time:tnow(),userId:currentUser.id}, uid2);
    setTyping(true);
    setTimeout(() => {
      setTyping(false);
      addMsg({id:uid(),from:"bot",time:tnow(),card:{color:{bg:"#EAF3DE",text:"#27500A",border:"#97C459",strong:"#3B6D11"},icon:"✅",title:"Adresse gespeichert",rows:[["Weclapp","Aktualisiert","green"],["Pulpo","Aktualisiert","green"],["DHL","Informiert","green"]]}}, uid2);
      addMsg({id:uid(),from:"bot",text:"Adresse korrigiert und DHL informiert.",time:tnow()}, uid2);
    }, 1800);
  };

  const handleInput = async (text, history) => {
    const t = text.toLowerCase();
    if (t.includes("p91111") || (t.includes("ean") && t.includes("fehlt")) || (t.includes("nicht") && t.includes("pulpo"))) {
      setTyping(true); await delay(900); setTyping(false);
      addMsg({id:uid(),from:"bot",time:tnow(),card:{color:{bg:"#E6F1FB",text:"#0C447C",border:"#85B7EB",strong:"#185FA5"},icon:"🔍",title:"Diagnose – P91111",rows:[["Weclapp","Freigegeben","green"],["Pulpo Transfer","3× Fehlgeschlagen","red"],["Ursache","Fehlende EAN","red"]]}}, uid2);
      await delay(400); setTyping(true); await delay(1000); setTyping(false);
      addMsg({id:uid(),from:"bot",text:"2 Artikel ohne EAN blockieren den Transfer. Hast du die Nummern?",time:tnow(),form:"ean"}, uid2);
      return;
    }
    if ((t.includes("adresse") && (t.includes("fehler")||t.includes("falsch"))) || t.includes("adressfehler") || t.includes("4821")) {
      setTyping(true); await delay(900); setTyping(false);
      addMsg({id:uid(),from:"bot",text:"Adressfehler erkannt. Bitte gib die vollständige Lieferadresse ein.",time:tnow(),form:"address"}, uid2);
      return;
    }
    if (t.includes("sync") || t.includes("synchron")) {
      setTyping(true); await delay(700); setTyping(false);
      if (syncState.running) {
        addMsg({id:uid(),from:"bot",text:`Sync läuft – nächster Zyklus in ${Math.floor(syncState.remaining/60)}:${String(syncState.remaining%60).padStart(2,"0")} Min.`,time:tnow()}, uid2);
        return;
      }
      addMsg({id:uid(),from:"bot",text:"Sync-Überwachung gestartet. Ich melde mich nach dem nächsten Zyklus.",time:tnow()}, uid2);
      setSyncState(p => ({...p, running:true, remaining:30}));
      return;
    }
    setTyping(true);
    try {
      const apiKey = localStorage.getItem("altruan_api_key") || "";
      const msgs = [
        ...history.slice(-12).map(m => ({role:m.from==="user"?"user":"assistant",content:m.text||(m.card?`[${m.card.title}]`:"")})).filter(m=>m.content.trim()),
        {role:"user",content:text}
      ];
      const resp = await fetch("https://api.anthropic.com/v1/messages", {
        method:"POST",
        headers:{"Content-Type":"application/json", ...(apiKey?{"x-api-key":apiKey}:{})},
        body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:800,system:SYS,messages:msgs})
      });
      const data = await resp.json();
      setTyping(false);
      addMsg({id:uid(),from:"bot",text:data.content?.[0]?.text||"Bitte erneut versuchen.",time:tnow()}, uid2);
    } catch {
      setTyping(false);
      addMsg({id:uid(),from:"bot",text:"Verbindungsfehler. API-Key in Einstellungen prüfen.",time:tnow()}, uid2);
    }
  };

  const send = async () => {
    const text = input.trim();
    if (!text || typing) return;
    setInput("");
    const history = getMsgs(uid2);
    addMsg({id:uid(),from:"user",text,time:tnow(),userId:currentUser.id}, uid2);
    await handleInput(text, history);
  };

  const chatMsgs = getMsgs(uid2);
  const sm = Math.floor(syncState.remaining/60);
  const ss = String(syncState.remaining%60).padStart(2,"0");

  return e("div",{style:{display:"flex",flexDirection:"column",height:"100%"}},
    syncState.running && e("div",{style:{background:"#E6F1FB",borderBottom:"0.5px solid #B5D4F4",padding:"5px 14px",fontSize:11,color:"#0C447C",display:"flex",justifyContent:"space-between",alignItems:"center",flexShrink:0}},
      e("span",null,"🔄 Sync – nächster Zyklus in ",e("strong",null,`${sm}:${ss}`)),
      e("div",{style:{width:70,height:3,background:"#B5D4F4",borderRadius:2,overflow:"hidden"}},
        e("div",{style:{width:`${Math.round((600-syncState.remaining)/600*100)}%`,height:"100%",background:"#185FA5",transition:"width 1s"}})
      )
    ),
    e("div",{style:{padding:"10px 14px",borderBottom:"0.5px solid #e8e8e5",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0}},
      e("div",{style:{display:"flex",alignItems:"center",gap:10}},
        e(Av,{init:"AA",bg:"#EEEDFE",tc:"#534AB7",size:34,online:true}),
        e("div",null,
          e("div",{style:{fontSize:13,fontWeight:500}},"Altruan Assistent"),
          e("div",{style:{fontSize:11,color:"#888",display:"flex",alignItems:"center",gap:4}},
            e("span",{style:{width:6,height:6,borderRadius:"50%",background:"#639922",display:"inline-block"}}),
            "Online · KI-Assistent",
            isAdmin && activeUser && e("span",{style:{marginLeft:6,color:"#534AB7"}},`→ ${activeUser.name}`)
          )
        )
      ),
      e("div",{style:{display:"flex",gap:6,alignItems:"center"}},
        isAdmin && e("select",{onChange:ev=>{const u=allUsers.find(x=>x.id===parseInt(ev.target.value));if(u)setActiveUser(u);},value:activeUser?.id,style:{fontSize:11,padding:"4px 7px",borderRadius:6,border:"0.5px solid #ccc",background:"white"}},
          allUsers.filter(u=>!u.admin).map(u=>e("option",{key:u.id,value:u.id},u.name))
        ),
        e(Tag,{bg:"#EAF3DE",color:"#3B6D11"},"🔒 Privat"),
        isAdmin && e(Tag,{bg:"#FAEEDA",color:"#854F0B"},"👁 Admin")
      )
    ),
    e("div",{style:{flex:1,overflowY:"auto",padding:14,display:"flex",flexDirection:"column",gap:10}},
      e("div",{style:{textAlign:"center",fontSize:10,color:"#aaa"}},new Date().toLocaleDateString("de-DE",{day:"2-digit",month:"long",year:"numeric"})),
      chatMsgs.map(msg => {
        const isMe = msg.from === "user";
        const mu = isMe ? (allUsers.find(u=>u.id===msg.userId)||currentUser) : null;
        if (msg.form === "ean") return e("div",{key:msg.id,style:{display:"flex",gap:8}}, e(Av,{init:"AA",bg:"#EEEDFE",tc:"#534AB7",size:26}), e(EANFormC,{onSubmit:resolveEAN,onCancel:cancelForm}));
        if (msg.form === "address") return e("div",{key:msg.id,style:{display:"flex",gap:8}}, e(Av,{init:"AA",bg:"#EEEDFE",tc:"#534AB7",size:26}), e(AddrFormC,{onSubmit:resolveAddr,onCancel:()=>{setMessages(p=>({...p,[uid2]:(p[uid2]||[]).filter(m=>!m.form)}));addMsg({id:uid(),from:"bot",text:"Abgebrochen.",time:tnow()},uid2);}}));
        return e("div",{key:msg.id,style:{display:"flex",gap:8,alignItems:"flex-end",flexDirection:isMe?"row-reverse":"row"}},
          isMe ? e(Av,{init:mu?.init||"?",bg:mu?.bg||"#eee",tc:mu?.tc||"#333",size:26}) : e(Av,{init:"AA",bg:"#EEEDFE",tc:"#534AB7",size:26}),
          e("div",{style:{display:"flex",flexDirection:"column",gap:2,maxWidth:"80%",alignItems:isMe?"flex-end":"flex-start"}},
            msg.card ? e(InfoCard,{...msg.card}) :
              e("div",{style:{borderRadius:11,padding:"9px 13px",fontSize:13,lineHeight:1.5,...(isMe?{background:TP,color:"white",borderBottomRightRadius:3}:{background:"#f1f0eb",border:"0.5px solid #e0dfd8",borderBottomLeftRadius:3,color:"#222"})}},msg.text),
            e("div",{style:{fontSize:10,color:"#aaa"}},msg.time)
          )
        );
      }),
      typing && e(TypingBubble,null),
      e("div",{ref:bottomRef})
    ),
    e("div",{style:{padding:"10px 14px",borderTop:"0.5px solid #eee",display:"flex",gap:8,flexShrink:0}},
      e("input",{value:input,onChange:ev=>setInput(ev.target.value),onKeyDown:ev=>ev.key==="Enter"&&send(),placeholder:"Nachricht schreiben...",style:{flex:1,padding:"8px 14px",borderRadius:18,border:"0.5px solid #ccc",fontSize:13,outline:"none",background:"#f8f8f7"}}),
      e("button",{onClick:send,style:{width:34,height:34,borderRadius:"50%",background:TP,border:"none",cursor:"pointer",color:"white",fontSize:14,flexShrink:0}},"➤")
    )
  );
}

function EANFormC({onSubmit,onCancel}) {
  const [e1,setE1] = useState(""); const [e2,setE2] = useState(""); const [err,setErr] = useState("");
  const ok = v => /^\d{8}$|^\d{13}$/.test(v);
  const IS = {width:"100%",padding:"7px 10px",borderRadius:7,border:"0.5px solid #ccc",fontSize:12,fontFamily:"monospace",boxSizing:"border-box",marginBottom:8};
  return e("div",{style:{borderRadius:11,overflow:"hidden",border:"1.5px solid #534AB7",maxWidth:"90%"}},
    e("div",{style:{padding:"9px 12px",background:"#EEEDFE",color:"#3C3489",fontSize:12,fontWeight:500}},"🔢 Fehlende EAN – Bestellung P91111"),
    e("div",{style:{padding:12,background:"white"}},
      e("div",{style:{padding:"7px 10px",background:"#FAEEDA",borderRadius:7,borderLeft:"3px solid #EF9F27",marginBottom:9,fontSize:11,color:"#633806"}},e("strong",{style:{color:"#854F0B"}},"2 Artikel ohne EAN")," – Transfer blockiert"),
      e("div",{style:{fontSize:11,color:"#888",marginBottom:3}},"Artikel 1 – Schreibtischlampe LED Pro (WC-00441)"),
      e("input",{value:e1,onChange:ev=>setE1(ev.target.value),placeholder:"EAN-13, z.B. 4006381333931",maxLength:14,style:IS}),
      e("div",{style:{fontSize:11,color:"#888",marginBottom:3}},"Artikel 2 – USB-C Hub 7-Port (WC-00519)"),
      e("input",{value:e2,onChange:ev=>setE2(ev.target.value),placeholder:"EAN-13, z.B. 4006381445021",maxLength:14,style:{...IS,marginBottom:err?6:0}}),
      err && e("div",{style:{fontSize:11,color:"#A32D2D",marginBottom:4}},err)
    ),
    e("div",{style:{padding:"8px 12px",background:"#f8f8f7",display:"flex",gap:6,borderTop:"0.5px solid #eee"}},
      e(Btn,{primary:true,small:true,onClick:()=>{if(!e1||!e2||!ok(e1)||!ok(e2)){setErr("Bitte gültige EAN-8 oder EAN-13 eingeben.");return;}onSubmit(e1,e2);}},"✓ EAN speichern"),
      e(Btn,{small:true,onClick:()=>onCancel("jira")},"Jira-Ticket"),
      e(Btn,{small:true,onClick:()=>onCancel("cancel")},"Abbrechen")
    )
  );
}

function AddrFormC({onSubmit,onCancel}) {
  const [f,setF] = useState({name:"",street:"",plz:"",city:"",land:"Deutschland"}); const [err,setErr] = useState("");
  const IS = {width:"100%",padding:"7px 10px",borderRadius:7,border:"0.5px solid #ccc",fontSize:12,boxSizing:"border-box"};
  const field = (label,key,ph) => e("div",{key},
    e("div",{style:{fontSize:11,color:"#888",marginBottom:3}},label),
    e("input",{value:f[key],onChange:ev=>setF(p=>({...p,[key]:ev.target.value})),placeholder:ph,style:IS})
  );
  return e("div",{style:{borderRadius:11,overflow:"hidden",border:"1.5px solid #534AB7",maxWidth:"90%"}},
    e("div",{style:{padding:"9px 12px",background:"#EEEDFE",color:"#3C3489",fontSize:12,fontWeight:500}},"📍 Lieferadresse eingeben"),
    e("div",{style:{padding:12,background:"white",display:"flex",flexDirection:"column",gap:7}},
      field("Empfänger / Firma","name","Mustermann GmbH"),
      field("Straße & Nr.","street","Musterstraße 12"),
      e("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}},
