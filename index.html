// ── Render helpers ────────────────────────────────────────────────────────────
function h(tag, attrs={}, ...children) {
  const el = document.createElement(tag);
  for (const [k,v] of Object.entries(attrs)) {
    if (k === "style" && typeof v === "object") Object.assign(el.style, v);
    else if (k.startsWith("on")) el.addEventListener(k.slice(2).toLowerCase(), v);
    else el.setAttribute(k, v);
  }
  for (const c of children.flat()) {
    if (c == null || c === false) continue;
    el.appendChild(typeof c === "string" ? document.createTextNode(c) : c);
  }
  return el;
}

function btn(label, primary, onClick, small, danger) {
  return h("button", {
    style:{fontSize:small?11:13,padding:small?"4px 10px":"8px 16px",borderRadius:7,border:`1px solid ${primary?"#534AB7":danger?"#E24B4A":"#ccc"}`,background:primary?"#534AB7":danger?"#FCEBEB":"white",color:primary?"#EEEDFE":danger?"#A32D2D":"#444",cursor:"pointer",display:"inline-flex",alignItems:"center",gap:5},
    onClick
  }, label);
}

function avatar(init, bg, tc, size=32, online=false) {
  const wrap = h("div",{style:{position:"relative",flexShrink:0}},
    h("div",{style:{width:size+"px",height:size+"px",borderRadius:"50%",background:bg,color:tc,display:"flex",alignItems:"center",justifyContent:"center",fontSize:Math.round(size*.34)+"px",fontWeight:500}},init)
  );
  if (online) wrap.appendChild(h("div",{style:{width:"9px",height:"9px",borderRadius:"50%",background:"#639922",position:"absolute",bottom:0,right:0,border:"2px solid white"}}));
  return wrap;
}

function tag(text, bg, color) {
  return h("span",{style:{fontSize:"10px",padding:"2px 7px",borderRadius:"4px",background:bg,color,fontWeight:500}},text);
}

function infoCard(col, icon, title, rows) {
  return h("div",{style:{borderRadius:"10px",overflow:"hidden",border:`0.5px solid ${col.border}`,borderLeft:`3px solid ${col.strong}`,maxWidth:"88%",background:"white"}},
    h("div",{style:{padding:"8px 12px",background:col.bg,color:col.text,fontSize:"12px",fontWeight:500}}, icon+" "+title),
    h("div",{style:{background:"#f8f8f7",padding:"7px 12px"}},
      ...rows.map((r,i)=>h("div",{style:{display:"flex",justifyContent:"space-between",fontSize:"11px",padding:"3px 0",borderBottom:i<rows.length-1?"0.5px solid #eee":"none"}},
        h("span",{style:{color:"#888"}},r[0]),
        h("span",{style:{fontWeight:500,color:r[2]==="red"?"#A32D2D":r[2]==="green"?"#3B6D11":r[2]==="amber"?"#854F0B":"#333"}},r[1])
      ))
    )
  );
}

function typingBubble() {

      ...[0,150,300].map(d=>{const dot=h("div",{style:{width:"5px",height:"5px",borderRadius:"50%",background:"#aaa",animation:`bounce .9s ${d}ms infinite`}}); return dot;})
    )

function chatBubble(text, isMe, userObj) {
  const av = isMe ? avatar(userObj?.init||"?",userObj?.bg||"#eee",userObj?.tc||"#333",26) : avatar("AA","#EEEDFE","#534AB7",26);

  }}, text);
  return h("div",{style:{display:"flex",gap:"8px",alignItems:"flex-end",flexDirection:isMe?"row-reverse":"row"}},
    av, h("div",{style:{display:"flex",flexDirection:"column",gap:"2px",maxWidth:"80%",alignItems:isMe?"flex-end":"flex-start"}}, bubble)

  // Topbar
  const topbar = h("div",{style:{padding:"11px 18px",borderBottom:"0.5px solid #e8e8e5",display:"flex",alignItems:"center",justifyContent:"space-between",background:"white",flexShrink:0}},

      h("div",{style:{fontSize:"15px",fontWeight:500,color:"#333"}},{chat:"💬 Altruan Assistent",dashboard:"📊 Dashboard",customer:"🛍 Kunden-Chat",apis:"🔌 API-Schnittstellen",settings:"⚙️ Einstellungen"}[currentView]),
      h("div",{style:{fontSize:"11px",color:"#aaa"}},navSubs[currentView])
    ),
    h("div",{style:{display:"flex",alignItems:"center",gap:"8px"}},
      h("div",{style:{width:"8px",height:"8px",borderRadius:"50%",background:"#639922"}}),
      h("span",{style:{fontSize:"11px",color:"#888"}},"Systeme verbunden")
    )
  );

  // Content
  const content = h("div",{id:"main-content",style:{flex:1,minHeight:0,overflow:"hidden"}});

  // Render view
  if (currentView==="chat") renderChat(content);

  else if (currentView==="customer") renderCustomer(content);

// ── Chat ──────────────────────────────────────────────────────────────────────
function getMessages() { return messages[currentUser.id] || []; }
function addBotMessage(text, extra={}) {
  if (!messages[currentUser.id]) messages[currentUser.id] = [];
  messages[currentUser.id].push({id:uid(), from:"bot", text, time:tnow(), ...extra});
}
function addUserMessage(text) {
  if (!messages[currentUser.id]) messages[currentUser.id] = [];
  messages[currentUser.id].push({id:uid(), from:"user", text, time:tnow(), userId:currentUser.id});
}

function renderChat(container) {
  container.innerHTML = "";

  // Init greeting
  if (!messages[currentUser.id] || !messages[currentUser.id].length) {
    setTimeout(() => { addBotMessage(`Hallo ${currentUser.name.split(" ")[0]}! Ich bin der Altruan Assistent. Wie kann ich dir helfen?`); renderChat($("main-content")); }, 300);
  }

  const syncBar = syncRunning ? h("div",{style:{background:"#E6F1FB",borderBottom:"0.5px solid #B5D4F4",padding:"5px 14px",fontSize:"11px",color:"#0C447C",display:"flex",justifyContent:"space-between",alignItems:"center",flexShrink:0}},
    h("span",null,"🔄 Sync – nächster Zyklus in ",h("strong",null,Math.floor(syncRemaining/60)+":"+String(syncRemaining%60).padStart(2,"0")+" Min")),
    h("div",{style:{width:"70px",height:"3px",background:"#B5D4F4",borderRadius:"2px",overflow:"hidden"}},
      h("div",{style:{width:Math.round((600-syncRemaining)/600*100)+"%",height:"100%",background:"#185FA5",transition:"width 1s"}})
    )
  ) : null;

  const header = h("div",{style:{padding:"10px 14px",borderBottom:"0.5px solid #e8e8e5",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0}},
    h("div",{style:{display:"flex",alignItems:"center",gap:"10px"}},
      avatar("AA","#EEEDFE","#534AB7",34,true),
      h("div",null,
        h("div",{style:{fontSize:"13px",fontWeight:500}},"Altruan Assistent"),
        h("div",{style:{fontSize:"11px",color:"#888",display:"flex",alignItems:"center",gap:"4px"}},
          h("span",{style:{width:"6px",height:"6px",borderRadius:"50%",background:"#639922",display:"inline-block"}}),
          "Online · KI-Assistent"
        )
      )
    ),
    h("div",{style:{display:"flex",gap:"6px",alignItems:"center"}},
      tag("🔒 Privat","#EAF3DE","#3B6D11"),
      currentUser.admin ? tag("👁 Admin","#FAEEDA","#854F0B") : null
    )
  );

  const msgsDiv = h("div",{id:"chat-msgs",style:{flex:1,overflowY:"auto",padding:"14px",display:"flex",flexDirection:"column",gap:"10px"}});
  renderMessages(msgsDiv);

  const inputEl = h("input",{
    type:"text", placeholder:"Nachricht schreiben...",
    style:{flex:1,padding:"8px 14px",borderRadius:"18px",border:"0.5px solid #ccc",fontSize:"13px",background:"#f8f8f7"}
  });
  inputEl.addEventListener("keydown", ev => { if(ev.key==="Enter") sendMessage(inputEl.value); inputEl.value=""; });

  const sendBtn = h("button",{
    style:{width:"34px",height:"34px",borderRadius:"50%",background:TP,border:"none",cursor:"pointer",color:"white",fontSize:"14px",flexShrink:0},
    onClick:()=>{ sendMessage(inputEl.value); inputEl.value=""; }
  },"➤");

  const inputRow = h("div",{style:{padding:"10px 14px",borderTop:"0.5px solid #eee",display:"flex",gap:"8px",flexShrink:0}}, inputEl, sendBtn);

  if (syncBar) container.appendChild(syncBar);
  container.appendChild(header);
  container.appendChild(msgsDiv);
  container.appendChild(inputRow);
  msgsDiv.scrollTop = msgsDiv.scrollHeight;
  setTimeout(()=>inputEl.focus(),100);
}

function renderMessages(container) {
  container.innerHTML = "";
  container.appendChild(h("div",{style:{textAlign:"center",fontSize:"10px",color:"#aaa"}},new Date().toLocaleDateString("de-DE",{day:"2-digit",month:"long",year:"numeric"})));

  const msgs = getMessages();
  for (const msg of msgs) {
    const isMe = msg.from === "user";
    const mu = isMe ? USERS.find(u=>u.id===msg.userId)||currentUser : null;

    if (msg.form === "ean") {
      container.appendChild(renderEANForm());
    } else if (msg.form === "address") {
      container.appendChild(renderAddrForm());
    } else if (msg.card) {
      const row = h("div",{style:{display:"flex",gap:"8px",alignItems:"flex-end"}},
        avatar("AA","#EEEDFE","#534AB7",26),
        h("div",{style:{display:"flex",flexDirection:"column",gap:"2px",maxWidth:"88%"}},
          infoCard(msg.card.color,msg.card.icon,msg.card.title,msg.card.rows),
          h("div",{style:{fontSize:"10px",color:"#aaa"}},msg.time)
        )
      );
      container.appendChild(row);
    } else {
      container.appendChild(chatBubble(msg.text, isMe, mu));
    }
  }

  if (typing) container.appendChild(typingBubble());
  container.scrollTop = container.scrollHeight;
}

function refreshChat() {
  const c = $("chat-msgs");
  if (c) { renderMessages(c); c.scrollTop = c.scrollHeight; }
}

function renderEANForm() {
  let e1="", e2="";
  const IS = {width:"100%",padding:"7px 10px",borderRadius:"7px",border:"0.5px solid #ccc",fontSize:"12px",fontFamily:"monospace",boxSizing:"border-box",marginBottom:"8px"};
  const errDiv = h("div",{style:{fontSize:"11px",color:"#A32D2D",marginBottom:"4px",display:"none"}});
  const inp1 = h("input",{style:IS,placeholder:"EAN-13, z.B. 4006381333931",maxlength:14});
  const inp2 = h("input",{style:IS,placeholder:"EAN-13, z.B. 4006381445021",maxlength:14});
  inp1.addEventListener("input",ev=>e1=ev.target.value);
  inp2.addEventListener("input",ev=>e2=ev.target.value);

  const ok = v => /^\d{8}$|^\d{13}$/.test(v);

  return h("div",{style:{display:"flex",gap:"8px"}},
    avatar("AA","#EEEDFE","#534AB7",26),
    h("div",{style:{borderRadius:"11px",overflow:"hidden",border:"1.5px solid #534AB7",maxWidth:"90%"}},
      h("div",{style:{padding:"9px 12px",background:"#EEEDFE",color:"#3C3489",fontSize:"12px",fontWeight:500}},"🔢 Fehlende EAN – Bestellung P91111"),
      h("div",{style:{padding:"12px",background:"white"}},
        h("div",{style:{padding:"7px 10px",background:"#FAEEDA",borderRadius:"7px",borderLeft:"3px solid #EF9F27",marginBottom:"9px",fontSize:"11px",color:"#633806"}},
          h("strong",{style:{color:"#854F0B"}},"2 Artikel ohne EAN")," – Transfer blockiert"),
        h("div",{style:{fontSize:"11px",color:"#888",marginBottom:"3px"}},"Artikel 1 – Schreibtischlampe LED Pro (WC-00441)"),
        inp1,
        h("div",{style:{fontSize:"11px",color:"#888",marginBottom:"3px"}},"Artikel 2 – USB-C Hub 7-Port (WC-00519)"),
        inp2, errDiv
      ),
      h("div",{style:{padding:"8px 12px",background:"#f8f8f7",display:"flex",gap:"6px",borderTop:"0.5px solid #eee"}},
        btn("✓ EAN speichern",true,()=>{
          if(!e1||!e2||!ok(e1)||!ok(e2)){errDiv.textContent="Bitte gültige EAN-8 oder EAN-13 eingeben.";errDiv.style.display="block";return;}
          submitEAN(e1,e2);
        },true),
        btn("Jira-Ticket",false,()=>cancelForm("jira"),true),
        btn("Abbrechen",false,()=>cancelForm("cancel"),true)
      )
    )
  );
}

function renderAddrForm() {
  let fv = {name:"",street:"",plz:"",city:"",land:"Deutschland"};
  const IS = {width:"100%",padding:"7px 10px",borderRadius:"7px",border:"0.5px solid #ccc",fontSize:"12px",boxSizing:"border-box"};
  const errDiv = h("div",{style:{fontSize:"11px",color:"#A32D2D",display:"none"}});
  const fields = {};
  const makeField = (label,key,ph) => {
    const inp = h("input",{style:IS,placeholder:ph});
    inp.addEventListener("input",ev=>fv[key]=ev.target.value);
    fields[key] = inp;
    return h("div",null,h("div",{style:{fontSize:"11px",color:"#888",marginBottom:"3px"}},label),inp);
  };

  return h("div",{style:{display:"flex",gap:"8px"}},
    avatar("AA","#EEEDFE","#534AB7",26),
    h("div",{style:{borderRadius:"11px",overflow:"hidden",border:"1.5px solid #534AB7",maxWidth:"90%"}},
      h("div",{style:{padding:"9px 12px",background:"#EEEDFE",color:"#3C3489",fontSize:"12px",fontWeight:500}},"📍 Lieferadresse eingeben"),
      h("div",{style:{padding:"12px",background:"white",display:"flex",flexDirection:"column",gap:"7px"}},
        makeField("Empfänger / Firma","name","Mustermann GmbH"),
        makeField("Straße & Nr.","street","Musterstraße 12"),
        h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px"}},makeField("PLZ","plz","80331"),makeField("Stadt","city","München")),
        makeField("Land","land","Deutschland"), errDiv
      ),
      h("div",{style:{padding:"8px 12px",background:"#f8f8f7",display:"flex",gap:"6px",borderTop:"0.5px solid #eee"}},
        btn("✓ Bestätigen",true,()=>{
          if(!fv.name||!fv.street||!fv.plz||!fv.city){errDiv.textContent="Alle Felder ausfüllen.";errDiv.style.display="block";return;}
          submitAddr(fv);
        },true),
        btn("Abbrechen",false,()=>cancelForm("cancel"),true)
      )
    )
  );
}

function cancelForm(act) {
  messages[currentUser.id] = (messages[currentUser.id]||[]).filter(m=>!m.form);
  if (act==="jira") {
    typing=true; refreshChat();
    setTimeout(()=>{
      typing=false;
      addBotMessage("",{card:{color:{bg:"#FCEBEB",text:"#791F1F",border:"#F09595",strong:"#A32D2D"},icon:"🎫",title:"Jira TK-2044 erstellt",rows:[["Ticket","TK-2044","red"],["Zugewiesen","Stammdaten-Team",""],["Status","Offen","amber"]]}});
      addBotMessage("Ticket TK-2044 erstellt und Stammdaten-Team zugewiesen.");
      refreshChat();
    },1400);
  } else {
    addBotMessage("Abgebrochen. Schreib mir wenn du weitere Hilfe benötigst.");
    refreshChat();
  }

async function sendMessage(text) {
  text = text.trim();
  if (!text || typing) return;
  addUserMessage(text);
  refreshChat();
  const t = text.toLowerCase();

  // EAN flow
  if (t.includes("p91111") || (t.includes("ean")&&t.includes("fehlt")) || (t.includes("nicht")&&t.includes("pulpo"))) {
    typing=true; refreshChat();
    await delay(900); typing=false;
    addBotMessage("",{card:{color:{bg:"#E6F1FB",text:"#0C447C",border:"#85B7EB",strong:"#185FA5"},icon:"🔍",title:"Diagnose – P91111",rows:[["Weclapp","Freigegeben","green"],["Pulpo Transfer","3× Fehlgeschlagen","red"],["Ursache","Fehlende EAN","red"]]}});
    refreshChat();
    await delay(400); typing=true; refreshChat();
    await delay(1000); typing=false;
    addBotMessage("2 Artikel ohne EAN blockieren den Transfer. Hast du die Nummern?",{form:"ean"});
    refreshChat(); return;
  }

  // Address flow
  if ((t.includes("adresse")&&(t.includes("fehler")||t.includes("falsch")))||t.includes("adressfehler")||t.includes("4821")) {
    typing=true; refreshChat();
    await delay(900); typing=false;
    addBotMessage("Adressfehler erkannt. Bitte gib die vollständige Lieferadresse ein.",{form:"address"});
    refreshChat(); return;
  }

  // Sync flow
  if (t.includes("sync")||t.includes("synchron")) {
    typing=true; refreshChat();
    await delay(700); typing=false;
    if (syncRunning) {
      addBotMessage(`Sync läuft – nächster Zyklus in ${Math.floor(syncRemaining/60)}:${String(syncRemaining%60).padStart(2,"0")} Min.`);
      refreshChat(); return;
    }
    addBotMessage("Sync-Überwachung gestartet. Ich melde mich nach dem nächsten Zyklus.");
    syncRunning=true; syncRemaining=30; syncAttempts=0;
    startSyncTimer();
    refreshChat(); return;
  }

  // Claude API
  typing=true; refreshChat();
  try {
    const apiKey = localStorage.getItem("altruan_api_key")||"";
    const history = getMessages().slice(-12).map(m=>({role:m.from==="user"?"user":"assistant",content:m.text||(m.card?`[${m.card.title}]`:"")})).filter(m=>m.content.trim());
    history.push({role:"user",content:text});
    const resp = await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",headers:{"Content-Type":"application/json",...(apiKey?{"x-api-key":apiKey}:{})},
      body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:800,system:SYS_PROMPT,messages:history})
    });
    const data = await resp.json();
    typing=false;
    addBotMessage(data.content?.[0]?.text||"Bitte erneut versuchen.");
  } catch {
    typing=false;
    addBotMessage("Verbindungsfehler. API-Key in Einstellungen prüfen.");
  }
  refreshChat();
}

function startSyncTimer() {
  if (syncTimer) clearInterval(syncTimer);
  syncTimer = setInterval(()=>{
    syncRemaining--;
    const bar = $("app")?.querySelector("[data-sync-fill]");
    if (bar) bar.style.width = Math.round((600-syncRemaining)/600*100)+"%";
    if (syncRemaining <= 0) {
      clearInterval(syncTimer); syncTimer=null; syncRunning=false;
      syncAttempts++;
      if (syncAttempts >= 2) {
        addBotMessage("",{card:{color:{bg:"#FCEBEB",text:"#791F1F",border:"#F09595",strong:"#A32D2D"},icon:"🎫",title:"Jira TK-2045 erstellt",rows:[["Ticket","TK-2045","red"],["Priorität","Hoch","red"],["Zugewiesen","DevOps-Team",""],["Status","Offen","amber"]]}});
        addBotMessage("Jira TK-2045 erstellt und DevOps-Team zugewiesen.");
      } else {
        addBotMessage("",{card:{color:{bg:"#EAF3DE",text:"#27500A",border:"#97C459",strong:"#3B6D11"},icon:"✅",title:"Sync erfolgreich",rows:[["Datensätze","47/47","green"],["Dauer","11 Sek",""],["Fehler","0","green"]]}});
        addBotMessage("Sync erfolgreich. 47 Datensätze übertragen.");
      }
      refreshChat();
    }
  },1000);
}

  }
  else if (custStep==="verify") {
    body.style.overflowY="auto";body.style.padding="20px";
    body.appendChild(h("button",{style:{background:"none",border:"none",cursor:"pointer",color:"#888",fontSize:"13px",marginBottom:"14px",fontFamily:"inherit"},onClick:()=>{custStep="select";renderCustView(container);}},"← Zurück"));
    body.appendChild(h("div",{style:{fontSize:"15px",fontWeight:500,marginBottom:"16px"}},"📦 Anfrage Auftrag"));
    const vf={order:"",email:""};
    const errDiv=h("div",{style:{fontSize:"12px",color:"#A32D2D",marginBottom:"8px",display:"none"}});
    const oinp=h("input",{placeholder:"z.B. ORD-10042",style:{...IS,fontFamily:"monospace"}});
    oinp.addEventListener("input",ev=>vf.order=ev.target.value);
    const einp=h("input",{type:"email",placeholder:"deine@email.de",style:IS});
    einp.addEventListener("input",ev=>vf.email=ev.target.value);
    const vbtn=btn("Weiter →",true,()=>{
      errDiv.style.display="none";
      const key=vf.order.trim().toUpperCase();const em=vf.email.trim().toLowerCase();
      const found=MOCK_ORDERS[key];
      if(!found){errDiv.textContent="Bestellnummer nicht gefunden.";errDiv.style.display="block";return;}
      if(found.email.toLowerCase()!==em){errDiv.textContent="E-Mail stimmt nicht überein.";errDiv.style.display="block";return;}
      vbtn.textContent="Wird geprüft…";vbtn.disabled=true;
      setTimeout(()=>{custVerified={orderNr:key,...found};custStep="chat";renderCustView(container);},1000);
    });
    body.appendChild(h("div",null,h("div",{style:{fontSize:"12px",color:"#555",marginBottom:"4px",fontWeight:500}},"Bestellnummer"),oinp));
    body.appendChild(h("div",null,h("div",{style:{fontSize:"12px",color:"#555",marginBottom:"4px",fontWeight:500}},"E-Mail"),einp));
    body.appendChild(errDiv);body.appendChild(vbtn);
    body.appendChild(h("div",{style:{marginTop:"12px",background:"#f8f8f7",borderRadius:"8px",padding:"9px 11px",fontSize:"11px",color:"#888"}},h("strong",{style:{color:"#666"}},"Test: "),"ORD-10042 · jonas.puettmann@altruan.de"));
  }
  else if (custStep==="ticket-confirm") {
    body.style.justifyContent="center";body.style.alignItems="center";body.style.padding="20px";
    body.appendChild(h("div",{style:{fontSize:"28px",marginBottom:"8px"}},"✅"));
    body.appendChild(h("div",{style:{fontSize:"16px",fontWeight:500,marginBottom:"6px"}},"Anfrage eingegangen!"));
    body.appendChild(h("div",{style:{fontSize:"13px",color:"#888",textAlign:"center",marginBottom:"18px",lineHeight:1.6}},"Unser Team meldet sich innerhalb 1 Werktag."));
    const card=h("div",{style:{width:"100%",maxWidth:"290px",background:"#f8f8f7",borderRadius:"10px",overflow:"hidden",border:"0.5px solid #e8e8e5",marginBottom:"16px"}});
    card.appendChild(h("div",{style:{background:TP,padding:"8px 13px",fontSize:"12px",fontWeight:500,color:"#EEEDFE",display:"flex",justifyContent:"space-between"}},h("span",null,"Ticket"),h("span",null,custTicket.nr)));
    for (const [k,v] of [["Name",custTicket.name],["Artikel",custTicket.artikel],["Menge",custTicket.menge],["Telefon",custTicket.phone]]) {
      card.appendChild(h("div",{style:{display:"flex",justifyContent:"space-between",fontSize:"12px",padding:"6px 13px",borderBottom:"0.5px solid #eee"}},h("span",{style:{color:"#888"}},k),h("span",{style:{fontWeight:500}},v)));
    }
    body.appendChild(card);
    body.appendChild(btn("Weitere Fragen →",true,()=>{custMsgs=[];custStep="chat";renderCustView(container);}));
  }
  else if (custStep==="chat") {
    if (!custMsgs.length) {
      const g=custMode==="angebot"&&custTicket?`Hallo ${custTicket.name.split(" ")[0]}! Ticket ${custTicket.nr} erfasst.`:custVerified?`Hallo ${custVerified.name.split(" ")[0]}! Bestellung ${custVerified.orderNr} gefunden.`:"Hallo!";
      setTimeout(()=>{custMsgs.push({id:uid(),from:"bot",text:g,time:tnow()});renderCustMsgs();},400);
    }
    const msgsDiv=h("div",{id:"cust-msgs",style:{flex:1,overflowY:"auto",padding:"14px",display:"flex",flexDirection:"column",gap:"8px"}});
    const custInput=h("input",{placeholder:"Deine Frage...",style:{flex:1,padding:"8px 13px",borderRadius:"18px",border:"1px solid #e0dfd8",fontSize:"13px",background:"#f8f8f7"}});

    const sendCust=async()=>{
      const text=custInput.value.trim();if(!text)return;custInput.value="";
      custMsgs.push({id:uid(),from:"user",text,time:tnow()});
      renderCustMsgs();
      const typDiv=typingBubble();msgsDiv.appendChild(typDiv);msgsDiv.scrollTop=msgsDiv.scrollHeight;
      try {
        const apiKey=localStorage.getItem("altruan_api_key")||"";
        const ctx=custVerified?`\nKunde: ${custVerified.name}\nBestellung: ${custVerified.orderNr}\nStatus: ${custVerified.status}\nTracking: ${custVerified.tracking}`:custTicket?`\nTicket: ${custTicket.nr}\nArtikel: ${custTicket.artikel}`:"";
        const hist=custMsgs.slice(-10).map(m=>({role:m.from==="user"?"user":"assistant",content:m.text||""})).filter(m=>m.content.trim());
        hist.push({role:"user",content:text});
        const resp=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json",...(apiKey?{"x-api-key":apiKey}:{})},body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:600,system:CUST_PROMPT+ctx,messages:hist})});
        const data=await resp.json();
        typDiv.remove();
        custMsgs.push({id:uid(),from:"bot",text:data.content?.[0]?.text||"Bitte erneut.",time:tnow()});
      } catch {typDiv.remove();custMsgs.push({id:uid(),from:"bot",text:"Verbindungsfehler.",time:tnow()});}
      renderCustMsgs();
    };

    custInput.addEventListener("keydown",ev=>{if(ev.key==="Enter")sendCust();});
    const sb=h("button",{style:{width:"32px",height:"32px",borderRadius:"50%",background:TP,border:"none",cursor:"pointer",color:"white",fontSize:"13px",flexShrink:0},onClick:sendCust},"➤");

    body.appendChild(msgsDiv);
    body.appendChild(h("div",{style:{padding:"10px 14px",borderTop:"0.5px solid #eee",display:"flex",gap:"8px",flexShrink:0}},custInput,sb));

    function renderCustMsgs() {
      msgsDiv.innerHTML="";
      for (const m of custMsgs) {
        const isMe=m.from==="user";
        msgsDiv.appendChild(h("div",{style:{display:"flex",gap:"7px",alignItems:"flex-end",flexDirection:isMe?"row-reverse":"row"}},
          !isMe?h("div",{style:{width:"24px",height:"24px",borderRadius:"50%",background:"#EEEDFE",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"12px",flexShrink:0}},"🤖"):null,
          h("div",{style:{borderRadius:"11px",padding:"8px 12px",fontSize:"13px",lineHeight:1.5,maxWidth:"78%",...(isMe?{background:TP,color:"white",borderBottomRightRadius:"3px"}:{background:"#f1f0eb",border:"0.5px solid #e0dfd8",borderBottomLeftRadius:"3px",color:"#222"})}},m.text)
        ));
      }
      msgsDiv.scrollTop=msgsDiv.scrollHeight;
    }
    renderCustMsgs();
  }
}

// ── Settings ──────────────────────────────────────────────────────────────────
function renderSettings(container) {
  container.innerHTML="";
  const wrap=h("div",{style:{padding:"24px",maxWidth:"540px"}});
  wrap.appendChild(h("div",{style:{fontSize:"15px",fontWeight:500,marginBottom:"4px"}},"Einstellungen"));
  wrap.appendChild(h("div",{style:{fontSize:"12px",color:"#888",marginBottom:"20px"}},"Bot-Konfiguration"));

  const keyInp=h("input",{type:"password",placeholder:"sk-ant-...",style:{width:"100%",padding:"8px 12px",borderRadius:"7px",border:"0.5px solid #ccc",fontSize:"13px",fontFamily:"monospace",boxSizing:"border-box",marginBottom:"10px"}});
  keyInp.value=localStorage.getItem("altruan_api_key")||"";
  const savedMsg=h("span",{style:{fontSize:"12px",color:"#3B6D11",marginLeft:"10px",display:"none"}},"✓ Gespeichert");
  wrap.appendChild(h("div",{style:{background:"white",border:"0.5px solid #e8e8e5",borderRadius:"10px",padding:"16px",marginBottom:"14px"}},
    h("div",{style:{fontSize:"13px",fontWeight:500,marginBottom:"4px"}},"Anthropic API-Key"),
    h("div",{style:{fontSize:"12px",color:"#888",marginBottom:"10px",lineHeight:1.5}},"Erhältlich unter ",h("a",{href:"https://console.anthropic.com",target:"_blank",rel:"noreferrer",style:{color:"#534AB7"}},"console.anthropic.com"),". Wird nur lokal gespeichert."),
    keyInp,
    h("div",{style:{display:"flex",alignItems:"center"}},
      btn("Speichern",true,()=>{localStorage.setItem("altruan_api_key",keyInp.value);savedMsg.style.display="inline";setTimeout(()=>savedMsg.style.display="none",2000);}),
      savedMsg
    )
  ));
  wrap.appendChild(h("div",{style:{background:"#f8f8f7",border:"0.5px solid #e8e8e5",borderRadius:"10px",padding:"16px"}},
    h("div",{style:{fontSize:"13px",fontWeight:500,marginBottom:"10px"}},"System-Info"),
    ...[["Version","1.0.0"],["Modell","claude-sonnet-4-6"],["Sync Lieferungen","alle 3 Min"],["Sync Bestellungen","alle 20 Min"],["Sync Produkte","alle 60 Min"],["Jira-Eskalation","nach 2 Fehlversuchen"]].map(([k,v])=>
      h("div",{style:{display:"flex",justifyContent:"space-between",fontSize:"12px",padding:"4px 0",borderBottom:"0.5px solid #eee"}},h("span",{style:{color:"#888"}},k),h("span",{style:{fontWeight:500}},v))
    )
  ));
  container.appendChild(wrap);
}

function renderLocked(container) {
  container.innerHTML="";
  container.appendChild(h("div",{style:{display:"flex",alignItems:"center",justifyContent:"center",height:"100%",flexDirection:"column",gap:"8px",color:"#aaa"}},
    h("span",{style:{fontSize:"32px"}},"🔒"),
    h("span",{style:{fontSize:"14px"}},"Admin-Berechtigung erforderlich")
  ));
}

// ── Boot ──────────────────────────────────────────────────────────────────────
document.addEventListener("DOMContentLoaded", renderShell);
</script>
</body>
</html>
