<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Altruan Bot Manager</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --tp:#534AB7; --tp-light:#EEEDFE; --bg:#ffffff; --side:#f8f8f7;
    --bd:#e8e8e5; --bd2:#eee; --tx:#333; --mut:#888; --mut2:#aaa; --grn:#639922;
  }
  html,body{height:100%}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;color:var(--tx);background:var(--bg);-webkit-font-smoothing:antialiased}
  #root{height:100vh}
  button{font-family:inherit;cursor:pointer}
  input,select,textarea{font-family:inherit}
  .layout{display:grid;grid-template-columns:210px 1fr;height:100vh}
  .side{background:var(--side);border-right:.5px solid var(--bd);display:flex;flex-direction:column;min-width:0}
  .brand{padding:14px 16px;border-bottom:.5px solid var(--bd);display:flex;align-items:center;gap:10px}
  .logo{width:30px;height:30px;background:var(--tp);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
  .nav{flex:1;padding:8px;overflow:auto}
  .navitem{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;font-size:13px;color:#666;user-select:none;border-left:2px solid transparent}
  .navitem:hover{background:#f0f0ee}
  .navitem.active{background:#fff;color:var(--tx);font-weight:500;border-left:2px solid var(--tp)}
  .badge-admin{font-size:10px;background:var(--tp-light);color:var(--tp);padding:2px 6px;border-radius:4px;margin-left:auto}
  .userbox{padding:12px 14px;border-top:.5px solid var(--bd);display:flex;align-items:center;gap:8px}
  .av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:600;flex-shrink:0}
  .main{display:flex;flex-direction:column;min-width:0}
  .topbar{padding:11px 18px;border-bottom:.5px solid var(--bd);display:flex;align-items:center;justify-content:space-between;background:#fff}
  .topbar h1{font-size:15px;font-weight:500}
  .topbar .sub{font-size:11px;color:var(--mut2)}
  .conn{display:flex;align-items:center;gap:8px}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--grn)}
  .content{flex:1;min-height:0;overflow:hidden;display:flex;flex-direction:column}
  /* chat */
  .chatwrap{flex:1;display:flex;flex-direction:column;min-height:0}
  .msgs{flex:1;overflow:auto;padding:20px 22px;display:flex;flex-direction:column;gap:12px}
  .row{display:flex;gap:10px;max-width:78%}
  .row.bot{align-self:flex-start}
  .row.me{align-self:flex-end;flex-direction:row-reverse}
  .bubble{padding:10px 13px;border-radius:12px;font-size:13.5px;line-height:1.5;white-space:pre-wrap;word-break:break-word}
  .row.bot .bubble{background:#f4f4f3;border:.5px solid var(--bd)}
  .row.me .bubble{background:var(--tp);color:#fff}
  .time{font-size:10px;color:var(--mut2);margin-top:4px}
  .inputbar{border-top:.5px solid var(--bd);padding:12px 18px;display:flex;gap:10px;align-items:flex-end;background:#fff}
  .inputbar textarea{flex:1;border:.5px solid #ccc;border-radius:10px;padding:10px 13px;font-size:13.5px;resize:none;max-height:120px;line-height:1.4}
  .send{background:var(--tp);color:#fff;border:none;border-radius:10px;padding:0 18px;height:40px;font-size:13px;font-weight:500}
  .send:disabled{opacity:.5;cursor:not-allowed}
  .typing{display:flex;gap:4px;padding:12px 14px}
  .typing span{width:7px;height:7px;border-radius:50%;background:#bbb;animation:tp 1.2s infinite}
  .typing span:nth-child(2){animation-delay:.2s}.typing span:nth-child(3){animation-delay:.4s}
  @keyframes tp{0%,60%,100%{opacity:.3}30%{opacity:1}}
  /* card / form */
  .card{background:#fff;border:.5px solid var(--bd);border-radius:12px;padding:14px 16px;margin-top:6px;max-width:420px}
  .card h3{font-size:13px;font-weight:600;margin-bottom:10px;display:flex;align-items:center;gap:8px}
  .field{margin-bottom:9px}
  .field label{display:block;font-size:11px;color:var(--mut);margin-bottom:3px}
  .field input,.field select{width:100%;padding:8px 10px;border:.5px solid #ccc;border-radius:7px;font-size:13px}
  .pri{background:var(--tp);color:#fff;border:none;border-radius:7px;padding:8px 14px;font-size:12.5px;font-weight:500}
  .sec{background:#fff;color:var(--tx);border:.5px solid #ccc;border-radius:7px;padding:8px 14px;font-size:12.5px}
  .status-card{background:#f8f8f7;border:.5px solid var(--bd);border-radius:10px;padding:12px 14px;margin-top:6px;max-width:420px}
  .sync-row{display:flex;justify-content:space-between;align-items:center;font-size:12px;padding:6px 0;border-bottom:.5px solid var(--bd2)}
  .sync-row:last-child{border-bottom:none}
  .mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
  /* dashboard */
  .scroll{flex:1;overflow:auto;padding:22px}
  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
  .kpi{background:#fff;border:.5px solid var(--bd);border-radius:12px;padding:16px}
  .kpi .num{font-size:26px;font-weight:600}
  .kpi .lbl{font-size:11px;color:var(--mut);margin-top:2px}
  .panel{background:#fff;border:.5px solid var(--bd);border-radius:12px;padding:16px;margin-bottom:18px}
  .panel h2{font-size:13px;font-weight:600;margin-bottom:14px}
  .bars{display:flex;gap:18px;align-items:flex-end;height:170px;padding:0 6px}
  .barcol{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;height:100%;justify-content:flex-end}
  .barstack{width:46px;border-radius:6px 6px 0 0;overflow:hidden;display:flex;flex-direction:column-reverse}
  .barname{font-size:11px;color:var(--mut)}
  table{width:100%;border-collapse:collapse;font-size:12.5px}
  th{text-align:left;padding:9px 10px;color:var(--mut);font-weight:500;border-bottom:.5px solid var(--bd);font-size:11px}
  td{padding:9px 10px;border-bottom:.5px solid var(--bd2)}
  .pill{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:500}
  .filterbar{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
  .fbtn{border:.5px solid #ccc;background:#fff;border-radius:20px;padding:5px 12px;font-size:12px;color:#555}
  .fbtn.on{background:var(--tp);color:#fff;border-color:var(--tp)}
  /* api manager */
  .api-card{background:#fff;border:.5px solid var(--bd);border-radius:10px;padding:13px 15px;margin-bottom:10px;display:flex;align-items:center;gap:12px}
  .api-card .nm{font-size:13px;font-weight:500}
  .api-card .ur{font-size:11px;color:var(--mut2);font-family:ui-monospace,monospace}
  .cat{font-size:10px;padding:2px 8px;border-radius:5px;background:#f0eefb;color:var(--tp);font-weight:500}
  .lock{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:8px;color:var(--mut2)}
  /* settings */
  .setbox{background:#fff;border:.5px solid var(--bd);border-radius:12px;padding:18px;max-width:520px;margin-bottom:16px}
  .setbox h2{font-size:13px;font-weight:600;margin-bottom:6px}
  .setbox p{font-size:11.5px;color:var(--mut);margin-bottom:12px;line-height:1.5}
  .setbox input{width:100%;padding:9px 12px;border:.5px solid #ccc;border-radius:7px;font-size:13px;font-family:ui-monospace,monospace;margin-bottom:10px}
  .info-row{display:flex;justify-content:space-between;font-size:12px;padding:5px 0;border-bottom:.5px solid var(--bd2)}
  .info-row span:first-child{color:var(--mut)}
  .info-row span:last-child{font-weight:500}
  .foot{font-size:10.5px;color:var(--mut2);text-align:center;padding:10px}
  .empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--mut2);gap:10px;font-size:13px}
  .select-card{display:flex;gap:14px;flex-wrap:wrap;padding:30px;justify-content:center;align-content:center;flex:1}
  .opt{width:200px;border:.5px solid var(--bd);border-radius:14px;padding:24px;text-align:center;background:#fff}
  .opt:hover{border-color:var(--tp);box-shadow:0 2px 10px rgba(83,74,183,.1)}
  .opt .ic{font-size:30px;margin-bottom:10px}
  .opt .t{font-size:14px;font-weight:600;margin-bottom:5px}
  .opt .d{font-size:11.5px;color:var(--mut)}
  @media(max-width:720px){.layout{grid-template-columns:1fr}.side{display:none}.kpis{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div id="root"></div>
<script>
"use strict";
(function(){

/* ---------- storage shim (localStorage on GitHub Pages, memory fallback) ---------- */
var mem={};
var store={
  get:function(k){try{var v=localStorage.getItem(k);return v===null?(k in mem?mem[k]:null):v;}catch(e){return k in mem?mem[k]:null;}},
  set:function(k,v){try{localStorage.setItem(k,v);}catch(e){mem[k]=v;}}
};

/* ---------- tiny DOM helper ---------- */
function el(tag,props){
  var n=document.createElement(tag),i,c;
  if(props){
    for(var k in props){
      var v=props[k];
      if(k==="style"&&typeof v==="object"){for(var s in v)n.style[s]=v[s];}
      else if(k==="class")n.className=v;
      else if(k.slice(0,2)==="on"&&typeof v==="function")n.addEventListener(k.slice(2).toLowerCase(),v);
      else if(k==="html")n.innerHTML=v;
      else if(v!=null&&v!==false)n.setAttribute(k,v===true?"":v);
    }
  }
  for(i=2;i<arguments.length;i++){
    c=arguments[i];
    if(c==null||c===false)continue;
    if(Array.isArray(c))c.forEach(function(x){if(x!=null&&x!==false)n.appendChild(x.nodeType?x:document.createTextNode(String(x)));});
    else n.appendChild(c.nodeType?c:document.createTextNode(String(c)));
  }
  return n;
}
function clear(n){while(n.firstChild)n.removeChild(n.firstChild);}
function now(){var d=new Date();return ("0"+d.getHours()).slice(-2)+":"+("0"+d.getMinutes()).slice(-2);}
function uid(){return Math.random().toString(36).slice(2,8);}

/* ---------- data ---------- */
var USERS=[
  {id:"u1",name:"Tobias Gumtow",role:"Logistik",init:"TG",bg:"#E3F0FF",tc:"#1C5FB8",admin:false},
  {id:"u2",name:"Nina Becker",role:"Kundenservice",init:"NB",bg:"#FDE8F3",tc:"#B8327C",admin:false},
  {id:"u3",name:"Lars Fischer",role:"Einkauf",init:"LF",bg:"#E7F6EC",tc:"#2C8C52",admin:false},
  {id:"u4",name:"Admin",role:"Administrator",init:"AD",bg:"#EEEDFE",tc:"#534AB7",admin:true}
];

var DEFAULT_APIS=[
  {id:"a1",name:"Weclapp",cat:"ERP",url:"https://altruan.weclapp.com/webapp/api/v1"},
  {id:"a2",name:"Pulpo WMS",cat:"Lager",url:"https://api.pulpo.com/v2"},
  {id:"a3",name:"Jira",cat:"Eskalation",url:"https://altruan.atlassian.net/rest/api/3"},
  {id:"a4",name:"Salesforce",cat:"CRM",url:"https://altruan.my.salesforce.com/services/data/v59"},
  {id:"a5",name:"Zendesk",cat:"Support",url:"https://altruan.zendesk.com/api/v2"},
  {id:"a6",name:"DHL",cat:"Versand",url:"https://api-eu.dhl.com/track/shipments"},
  {id:"a7",name:"Schenker",cat:"Versand",url:"https://api.dbschenker.com/v1"},
  {id:"a8",name:"Microsoft Teams",cat:"Channel",url:"https://smba.trafficmanager.net/teams"},
  {id:"a9",name:"Shopify",cat:"Shop",url:"https://altruan.myshopify.com/admin/api/2024-01"},
  {id:"a10",name:"Miracle",cat:"Buchhaltung",url:"https://api.miracle-software.de/v1"}
];

var TICKETS=[
  {nr:"AB-2041",user:"Tobias Gumtow",cat:"EAN-Fehler",status:"gelöst"},
  {nr:"AB-2042",user:"Nina Becker",cat:"Adresskorrektur",status:"gelöst"},
  {nr:"AB-2043",user:"Lars Fischer",cat:"Sync-Eskalation",status:"eskaliert"},
  {nr:"AB-2044",user:"Tobias Gumtow",cat:"DHL-Tracking",status:"in Bearbeitung"},
  {nr:"AB-2045",user:"Nina Becker",cat:"Rücksendung",status:"gelöst"},
  {nr:"AB-2046",user:"Tobias Gumtow",cat:"EAN-Fehler",status:"offen"},
  {nr:"AB-2047",user:"Lars Fischer",cat:"Adresskorrektur",status:"gelöst"},
  {nr:"AB-2048",user:"Nina Becker",cat:"DHL-Tracking",status:"in Bearbeitung"}
];

var STATUS_COLORS={
  "gelöst":{bg:"#E7F6EC",c:"#2C8C52"},
  "in Bearbeitung":{bg:"#FFF4E0",c:"#C7891F"},
  "offen":{bg:"#EEF2F7",c:"#5A6B82"},
  "eskaliert":{bg:"#FCE8E8",c:"#C53A3A"}
};

function getApis(){var raw=store.get("altruan_apis");if(raw){try{return JSON.parse(raw);}catch(e){}}return DEFAULT_APIS.slice();}
function saveApis(a){store.set("altruan_apis",JSON.stringify(a));}
function getKey(){return store.get("altruan_api_key")||"";}

/* ---------- Claude API ---------- */
function callClaude(messages,system,cb){
  var key=getKey();
  if(!key){cb(null,"NO_KEY");return;}
  fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{
      "content-type":"application/json",
      "x-api-key":key,
      "anthropic-version":"2023-06-01",
      "anthropic-dangerous-direct-browser-access":"true"
    },
    body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1024,system:system,messages:messages})
  }).then(function(r){return r.json();}).then(function(data){
    if(data.error){cb(null,data.error.message||"API-Fehler");return;}
    var txt=(data.content||[]).filter(function(b){return b.type==="text";}).map(function(b){return b.text;}).join("\n");
    cb(txt||"(keine Antwort)",null);
  }).catch(function(e){cb(null,e.message||"Netzwerkfehler");});
}

var EMP_SYSTEM=
"Du bist der Altruan Logistik-Assistent, ein interner KI-Bot für Mitarbeiter eines Sanitäts- und Logistikunternehmens. "+
"Antworte auf Deutsch, knapp, freundlich und lösungsorientiert. Du hast Zugriff auf folgende Systeme: Weclapp (ERP), "+
"Pulpo (Lager/WMS), Jira (Eskalation), Salesforce (CRM), Zendesk, DHL & Schenker (Versand), Shopify, Miracle. "+
"Synchronisierung: Lieferungen nach Pulpo alle 3 Minuten, Lieferanten-Bestellungen alle 20 Minuten, Produkte alle 60 Minuten. "+
"Eskalation an Jira erfolgt nach 2 Fehlversuchen. "+
"Wenn der Mitarbeiter einen EAN-/Artikelnummer-Fehler meldet, fordere die Daten an und beende deine Antwort mit der eigenen Zeile [[EAN_FORM]]. "+
"Wenn es um eine Adresskorrektur geht, beende mit der eigenen Zeile [[ADRESS_FORM]]. "+
"Wenn nach Sync-/Schnittstellen-Status gefragt wird, beende mit der eigenen Zeile [[SYNC_STATUS]]. "+
"Verwende diese Marker höchstens einmal pro Antwort und nur wenn wirklich passend.";

var CUST_SYSTEM=
"Du bist der Altruan Kunden-Assistent. Antworte auf Deutsch, freundlich, empathisch und kurz. "+
"Du hilfst bei Bestellungen, Lieferungen, Angeboten und Rücksendungen. Bei komplexen Fällen kündigst du an, "+
"dass ein Mitarbeiter sich meldet (Ticket wurde erstellt).";

/* ============================================================ APP ============ */
var root=document.getElementById("root");
var state={view:"chat",user:USERS[0]};

var NAV=[
  {id:"chat",label:"Chat",icon:"💬"},
  {id:"dashboard",label:"Dashboard",icon:"📊"},
  {id:"customer",label:"Kunden-Chat",icon:"🛍"},
  {id:"apis",label:"API-Schnittstellen",icon:"🔌",adminOnly:true},
  {id:"settings",label:"Einstellungen",icon:"⚙️"}
];
var TITLES={chat:"💬 Altruan Assistent",dashboard:"📊 Dashboard",customer:"🛍 Kunden-Chat",apis:"🔌 API-Schnittstellen",settings:"⚙️ Einstellungen"};
var SUBS={chat:"Privater Chat · vertraulich",dashboard:"Ticket-Übersicht & Statistiken",customer:"Kunden-Portal",apis:"Schnittstellen verwalten – kein Code nötig",settings:"Bot-Konfiguration"};

function avatar(u,size){
  return el("div",{class:"av",style:{width:size+"px",height:size+"px",background:u.bg,color:u.tc,fontSize:(size*0.36)+"px"}},u.init);
}

function render(){
  clear(root);
  var side=el("div",{class:"side"},
    el("div",{class:"brand"},
      el("div",{class:"logo"},"🤖"),
      el("div",{},
        el("div",{style:{fontSize:"13px",fontWeight:"500"}},"Bot Manager"),
        el("div",{style:{fontSize:"10px",color:"var(--mut2)"}},"Altruan")
      )
    ),
    el("div",{class:"nav"},NAV.map(function(n){
      var active=state.view===n.id;
      return el("div",{class:"navitem"+(active?" active":""),onClick:function(){state.view=n.id;render();}},
        el("span",{},n.icon),
        el("span",{},n.label),
        n.adminOnly?el("span",{class:"badge-admin"},"Admin"):null
      );
    })),
    el("div",{class:"userbox"},
      avatar(state.user,30),
      el("div",{},
        el("div",{style:{fontSize:"12px",fontWeight:"500"}},state.user.name),
        el("div",{style:{fontSize:"10px",color:"var(--mut2)"}},state.user.role)
      )
    ),
    el("div",{class:"foot"},"© Altruan · Jonas Püttmann")
  );

  // user switcher inside brand area (small select)
  var switcher=el("select",{
    style:{margin:"0 16px 10px",padding:"6px 8px",border:".5px solid #ccc",borderRadius:"7px",fontSize:"12px",width:"calc(100% - 32px)"},
    onChange:function(e){state.user=USERS[e.target.selectedIndex];if(state.view==="apis"&&!state.user.admin){}render();}
  },USERS.map(function(u){return el("option",{value:u.id},u.name+(u.admin?" (Admin)":""));}));
  switcher.selectedIndex=USERS.indexOf(state.user);
  side.insertBefore(switcher,side.querySelector(".userbox"));

  var topbar=el("div",{class:"topbar"},
    el("div",{},
      el("h1",{},TITLES[state.view]),
      el("div",{class:"sub"},SUBS[state.view])
    ),
    el("div",{class:"conn"},el("div",{class:"dot"}),el("span",{style:{fontSize:"11px",color:"var(--mut)"}},"Systeme verbunden"))
  );

  var content=el("div",{class:"content"});
  if(state.view==="chat")content.appendChild(viewChat());
  else if(state.view==="dashboard")content.appendChild(viewDashboard());
  else if(state.view==="customer")content.appendChild(viewCustomer());
  else if(state.view==="apis")content.appendChild(state.user.admin?viewApis():lock());
  else if(state.view==="settings")content.appendChild(viewSettings());

  root.appendChild(el("div",{class:"layout"},side,el("div",{class:"main"},topbar,content)));
}

function lock(){return el("div",{class:"lock"},el("span",{style:{fontSize:"32px"}},"🔒"),el("span",{},"Admin-Berechtigung erforderlich"));}

/* ---------- inline cards ---------- */
function eanForm(msgsBox){
  var f=el("div",{class:"card"},el("h3",{},"📦 EAN / Artikel prüfen"));
  function fld(lbl,id,ph){return el("div",{class:"field"},el("label",{},lbl),el("input",{id:id,placeholder:ph||""}));}
  f.appendChild(fld("EAN","ean_ean","z.B. 4250083421337"));
  f.appendChild(fld("Artikelnummer","ean_art","z.B. P91111"));
  f.appendChild(fld("Bestellnummer","ean_best","optional"));
  f.appendChild(el("button",{class:"pri",onClick:function(){
    var ean=f.querySelector("#ean_ean").value||"—",art=f.querySelector("#ean_art").value||"—";
    f.innerHTML="";f.appendChild(el("h3",{},"✅ EAN-Prüfung übermittelt"));
    f.appendChild(el("div",{style:{fontSize:"12.5px",lineHeight:"1.6"}},
      "EAN "+ean+" / Artikel "+art+" wurde zur Validierung an Weclapp & Pulpo übergeben. Korrektur wird beim nächsten Sync (max. 3 Min) übernommen."));
  }},"Absenden"));
  return f;
}
function adressForm(){
  var f=el("div",{class:"card"},el("h3",{},"🏠 Adresskorrektur"));
  function fld(lbl,id,ph){return el("div",{class:"field"},el("label",{},lbl),el("input",{id:id,placeholder:ph||""}));}
  f.appendChild(fld("Bestellnummer","ad_best","z.B. AB-2042"));
  f.appendChild(fld("Name / Firma","ad_name"));
  f.appendChild(fld("Straße & Nr.","ad_str"));
  var two=el("div",{style:{display:"flex",gap:"8px"}});
  var plz=el("div",{class:"field",style:{flex:"0 0 90px"}},el("label",{},"PLZ"),el("input",{id:"ad_plz"}));
  var ort=el("div",{class:"field",style:{flex:"1"}},el("label",{},"Ort"),el("input",{id:"ad_ort"}));
  two.appendChild(plz);two.appendChild(ort);f.appendChild(two);
  f.appendChild(fld("Land","ad_land","Deutschland"));
  f.appendChild(el("button",{class:"pri",onClick:function(){
    f.innerHTML="";f.appendChild(el("h3",{},"✅ Adresse aktualisiert"));
    f.appendChild(el("div",{style:{fontSize:"12.5px",lineHeight:"1.6"}},
      "Die korrigierte Adresse wurde in Weclapp & Salesforce gespeichert und an den Versanddienstleister übergeben."));
  }},"Adresse speichern"));
  return f;
}
function syncCard(){
  var c=el("div",{class:"status-card"},el("h3",{style:{fontSize:"12px",fontWeight:"600",marginBottom:"8px"}},"🔄 Sync-Status"));
  [["Lieferungen → Pulpo","alle 3 Min","🟢 aktiv"],
   ["Lieferanten-Bestellungen","alle 20 Min","🟢 aktiv"],
   ["Produkte","alle 60 Min","🟢 aktiv"],
   ["Jira-Eskalation","nach 2 Fehlversuchen","⏳ bereit"]].forEach(function(r){
    c.appendChild(el("div",{class:"sync-row"},el("span",{},r[0]),el("span",{class:"mono",style:{color:"var(--mut)"}},r[1]),el("span",{},r[2])));
  });
  return c;
}

/* ---------- CHAT VIEW ---------- */
var chatMsgs={}; // per user id
function viewChat(){
  var uidKey=state.user.id;
  if(!chatMsgs[uidKey])chatMsgs[uidKey]=[{from:"bot",text:"Hallo "+state.user.name.split(" ")[0]+"! Ich bin dein Altruan Assistent. Womit kann ich helfen – EAN-Fehler, Adresse, Tracking oder Sync-Status?",time:now()}];
  var msgsArr=chatMsgs[uidKey];

  var box=el("div",{class:"msgs"});
  var wrap=el("div",{class:"chatwrap"},box);

  function bubbleFor(m){
    var av=m.from==="bot"?el("div",{class:"logo",style:{width:"30px",height:"30px",fontSize:"15px"}},"🤖"):avatar(state.user,30);
    var inner=el("div",{});
    var txt=m.text, markers=[];
    ["[[EAN_FORM]]","[[ADRESS_FORM]]","[[SYNC_STATUS]]"].forEach(function(mk){
      if(txt.indexOf(mk)>-1){markers.push(mk);txt=txt.split(mk).join("").trim();}
    });
    inner.appendChild(el("div",{class:"bubble"},txt));
    markers.forEach(function(mk){
      if(mk==="[[EAN_FORM]]")inner.appendChild(eanForm());
      else if(mk==="[[ADRESS_FORM]]")inner.appendChild(adressForm());
      else if(mk==="[[SYNC_STATUS]]")inner.appendChild(syncCard());
    });
    inner.appendChild(el("div",{class:"time"},m.time));
    return el("div",{class:"row "+(m.from==="bot"?"bot":"me")},av,inner);
  }
  function paint(){clear(box);msgsArr.forEach(function(m){box.appendChild(bubbleFor(m));});box.scrollTop=box.scrollHeight;}
  paint();

  var ta=el("textarea",{rows:"1",placeholder:"Nachricht an den Assistenten…"});
  var sendBtn=el("button",{class:"send"},"Senden");
  ta.addEventListener("input",function(){ta.style.height="auto";ta.style.height=Math.min(ta.scrollHeight,120)+"px";});

  function send(){
    var v=ta.value.trim();if(!v)return;
    msgsArr.push({from:"me",text:v,time:now()});ta.value="";ta.style.height="auto";paint();
    var typing=el("div",{class:"row bot"},el("div",{class:"logo",style:{width:"30px",height:"30px",fontSize:"15px"}},"🤖"),el("div",{class:"typing"},el("span"),el("span"),el("span")));
    box.appendChild(typing);box.scrollTop=box.scrollHeight;sendBtn.disabled=true;
    var history=msgsArr.filter(function(m){return !m._sys;}).map(function(m){return {role:m.from==="me"?"user":"assistant",content:m.text};});
    callClaude(history,EMP_SYSTEM,function(reply,err){
      sendBtn.disabled=false;if(typing.parentNode)box.removeChild(typing);
      if(err==="NO_KEY"){msgsArr.push({from:"bot",text:"⚠️ Bitte zuerst unter Einstellungen deinen Anthropic API-Key hinterlegen, dann antworte ich mit echter KI.",time:now()});}
      else if(err){msgsArr.push({from:"bot",text:"⚠️ Fehler: "+err,time:now()});}
      else{msgsArr.push({from:"bot",text:reply,time:now()});}
      paint();
    });
  }
  sendBtn.addEventListener("click",send);
  ta.addEventListener("keydown",function(e){if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();}});

  wrap.appendChild(el("div",{class:"inputbar"},ta,sendBtn));
  return wrap;
}

/* ---------- DASHBOARD ---------- */
function viewDashboard(){
  var filter="alle";
  var scroll=el("div",{class:"scroll"});

  function build(){
    clear(scroll);
    var total=TICKETS.length;
    var solved=TICKETS.filter(function(t){return t.status==="gelöst";}).length;
    var esc=TICKETS.filter(function(t){return t.status==="eskaliert";}).length;
    var quote=Math.round(solved/total*100);
    scroll.appendChild(el("div",{class:"kpis"},
      el("div",{class:"kpi"},el("div",{class:"num"},total),el("div",{class:"lbl"},"Tickets gesamt")),
      el("div",{class:"kpi"},el("div",{class:"num",style:{color:"var(--grn)"}},quote+"%"),el("div",{class:"lbl"},"Automatisch gelöst")),
      el("div",{class:"kpi"},el("div",{class:"num"},"<2 Min"),el("div",{class:"lbl"},"Ø Reaktionszeit")),
      el("div",{class:"kpi"},el("div",{class:"num",style:{color:"#C53A3A"}},esc),el("div",{class:"lbl"},"Eskalationen"))
    ));

    // stacked bars per employee
    var emps=["Tobias Gumtow","Nina Becker","Lars Fischer"];
    var bars=el("div",{class:"bars"});
    var maxC=0;
    var data=emps.map(function(name){
      var ts=TICKETS.filter(function(t){return t.user===name;});
      var by={};Object.keys(STATUS_COLORS).forEach(function(s){by[s]=ts.filter(function(t){return t.status===s;}).length;});
      if(ts.length>maxC)maxC=ts.length;return {name:name,count:ts.length,by:by};
    });
    data.forEach(function(d){
      var stack=el("div",{class:"barstack",style:{height:(d.count/Math.max(maxC,1)*140)+"px"}});
      Object.keys(STATUS_COLORS).forEach(function(s){
        if(d.by[s]>0)stack.appendChild(el("div",{style:{height:(d.by[s]/d.count*100)+"%",background:STATUS_COLORS[s].c}}));
      });
      bars.appendChild(el("div",{class:"barcol"},stack,el("div",{class:"barname"},d.name.split(" ")[0]),el("div",{style:{fontSize:"11px",fontWeight:"600"}},d.count)));
    });
    scroll.appendChild(el("div",{class:"panel"},el("h2",{},"Tickets pro Mitarbeiter"),bars));

    // filter + table
    var statuses=["alle","gelöst","in Bearbeitung","offen","eskaliert"];
    var fb=el("div",{class:"filterbar"},statuses.map(function(s){
      return el("button",{class:"fbtn"+(filter===s?" on":""),onClick:function(){filter=s;build();}},s.charAt(0).toUpperCase()+s.slice(1));
    }));
    var rows=TICKETS.filter(function(t){return filter==="alle"||t.status===filter;});
    var table=el("table",{},
      el("thead",{},el("tr",{},el("th",{},"Ticket"),el("th",{},"Mitarbeiter"),el("th",{},"Kategorie"),el("th",{},"Status"))),
      el("tbody",{},rows.map(function(t){
        var sc=STATUS_COLORS[t.status];
        return el("tr",{},el("td",{class:"mono"},t.nr),el("td",{},t.user),el("td",{},t.cat),
          el("td",{},el("span",{class:"pill",style:{background:sc.bg,color:sc.c}},t.status)));
      }))
    );
    scroll.appendChild(el("div",{class:"panel"},el("h2",{},"Ticket-Übersicht"),fb,table));
  }
  build();
  return scroll;
}

/* ---------- CUSTOMER CHAT ---------- */
function viewCustomer(){
  var cust={step:"select",mode:null,ticket:null,verified:null,msgs:[]};
  var wrap=el("div",{class:"chatwrap"});

  function rebuild(){
    clear(wrap);
    if(cust.step==="select"){
      wrap.appendChild(el("div",{class:"select-card"},
        el("div",{class:"opt",onClick:function(){cust.mode="angebot";cust.step="angebot";rebuild();}},
          el("div",{class:"ic"},"📝"),el("div",{class:"t"},"Angebot anfragen"),el("div",{class:"d"},"Neue Anfrage / Angebot anfordern")),
        el("div",{class:"opt",onClick:function(){cust.mode="auftrag";cust.step="verify";rebuild();}},
          el("div",{class:"ic"},"📦"),el("div",{class:"t"},"Auftrag / Bestellung"),el("div",{class:"d"},"Status zu bestehender Bestellung")) 
      ));
      return;
    }
    if(cust.step==="angebot"){
      var f=el("div",{class:"card",style:{margin:"30px auto"}},el("h3",{},"📝 Angebotsanfrage"));
      function fld(l,id){return el("div",{class:"field"},el("label",{},l),el("input",{id:id}));}
      f.appendChild(fld("Name","c_name"));f.appendChild(fld("E-Mail","c_mail"));f.appendChild(fld("Produkt / Bedarf","c_prod"));
      f.appendChild(el("button",{class:"pri",onClick:function(){
        var name=f.querySelector("#c_name").value||"Kunde";
        cust.ticket={nr:"ANF-"+Math.floor(1000+Math.random()*9000),name:name};
        cust.step="chat";cust.msgs=[];rebuild();
      }},"Anfrage senden"));
      wrap.appendChild(el("div",{style:{flex:"1",overflow:"auto"}},f));
      return;
    }
    if(cust.step==="verify"){
      var vf=el("div",{class:"card",style:{margin:"30px auto"}},el("h3",{},"🔎 Bestellung suchen"));
      vf.appendChild(el("div",{class:"field"},el("label",{},"Bestellnummer"),el("input",{id:"v_nr",placeholder:"z.B. AB-2042"})));
      vf.appendChild(el("div",{class:"field"},el("label",{},"E-Mail oder PLZ"),el("input",{id:"v_id"})));
      vf.appendChild(el("button",{class:"pri",onClick:function(){
        var nr=vf.querySelector("#v_nr").value||"AB-0000";
        cust.verified={orderNr:nr,name:"Kunde"};cust.step="chat";cust.msgs=[];rebuild();
      }},"Suchen"));
      wrap.appendChild(el("div",{style:{flex:"1",overflow:"auto"}},vf));
      return;
    }
    // chat step
    var box=el("div",{class:"msgs"});
    if(cust.msgs.length===0){
      var greet=cust.mode==="angebot"&&cust.ticket
        ? "Hallo! Ihre Anfrage "+cust.ticket.nr+" wurde erfasst – ein Mitarbeiter erstellt Ihnen zeitnah ein Angebot. Haben Sie noch Fragen?"
        : cust.verified ? "Hallo! Bestellung "+cust.verified.orderNr+" gefunden. Wie kann ich helfen?"
        : "Hallo! Wie kann ich helfen?";
      cust.msgs.push({from:"bot",text:greet,time:now()});
    }
    function paintC(){clear(box);cust.msgs.forEach(function(m){
      var av=m.from==="bot"?el("div",{class:"logo",style:{width:"30px",height:"30px",fontSize:"15px"}},"🤖"):el("div",{class:"av",style:{width:"30px",height:"30px",background:"#EEF2F7",color:"#5A6B82",fontSize:"11px"}},"DU");
      box.appendChild(el("div",{class:"row "+(m.from==="bot"?"bot":"me")},av,el("div",{},el("div",{class:"bubble"},m.text),el("div",{class:"time"},m.time))));
    });box.scrollTop=box.scrollHeight;}
    paintC();
    var cwrap=el("div",{class:"chatwrap"},box);
    var ta=el("textarea",{rows:"1",placeholder:"Ihre Nachricht…"});
    var sb=el("button",{class:"send"},"Senden");
    function sc(){
      var v=ta.value.trim();if(!v)return;cust.msgs.push({from:"me",text:v,time:now()});ta.value="";paintC();
      var t=el("div",{class:"row bot"},el("div",{class:"logo",style:{width:"30px",height:"30px",fontSize:"15px"}},"🤖"),el("div",{class:"typing"},el("span"),el("span"),el("span")));
      box.appendChild(t);box.scrollTop=box.scrollHeight;sb.disabled=true;
      var hist=cust.msgs.map(function(m){return {role:m.from==="me"?"user":"assistant",content:m.text};});
      callClaude(hist,CUST_SYSTEM,function(reply,err){
        sb.disabled=false;if(t.parentNode)box.removeChild(t);
        if(err==="NO_KEY")cust.msgs.push({from:"bot",text:"⚠️ Bitte API-Key in den Einstellungen hinterlegen.",time:now()});
        else if(err)cust.msgs.push({from:"bot",text:"⚠️ "+err,time:now()});
        else cust.msgs.push({from:"bot",text:reply,time:now()});
        paintC();
      });
    }
    sb.addEventListener("click",sc);
    ta.addEventListener("keydown",function(e){if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sc();}});
    cwrap.appendChild(el("div",{class:"inputbar"},
      el("button",{class:"sec",onClick:function(){cust.step="select";cust.mode=null;cust.verified=null;cust.ticket=null;cust.msgs=[];rebuild();}},"↩"),
      ta,sb));
    wrap.appendChild(cwrap);
  }
  rebuild();
  return wrap;
}

/* ---------- API MANAGER ---------- */
function viewApis(){
  var apis=getApis();
  var scroll=el("div",{class:"scroll"});
  function build(){
    clear(scroll);
    scroll.appendChild(el("button",{class:"pri",style:{marginBottom:"14px"},onClick:function(){editor(null);}},"+ Schnittstelle hinzufügen"));
    apis.forEach(function(a){
      scroll.appendChild(el("div",{class:"api-card"},
        el("div",{style:{width:"34px",height:"34px",borderRadius:"8px",background:"#f0eefb",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"15px"}},"🔌"),
        el("div",{style:{flex:"1",minWidth:"0"}},
          el("div",{class:"nm"},a.name,el("span",{class:"cat",style:{marginLeft:"8px"}},a.cat)),
          el("div",{class:"ur"},a.url)),
        el("button",{class:"sec",style:{padding:"5px 10px"},onClick:function(){editor(a);}},"Bearbeiten"),
        el("button",{class:"sec",style:{padding:"5px 10px",color:"#C53A3A"},onClick:function(){
          apis=apis.filter(function(x){return x.id!==a.id;});saveApis(apis);build();
        }},"Löschen")
      ));
    });
  }
  function editor(a){
    var isNew=!a;a=a||{id:"a"+uid(),name:"",cat:"",url:""};
    clear(scroll);
    var f=el("div",{class:"setbox"},el("h2",{},isNew?"Neue Schnittstelle":"Schnittstelle bearbeiten"));
    function fld(l,id,v){var i=el("input",{id:id,value:v||""});return {row:el("div",{class:"field"},el("label",{},l),i),input:i};}
    var n=fld("Name","e_name",a.name),c=fld("Kategorie","e_cat",a.cat),u=fld("API-URL","e_url",a.url);
    f.appendChild(n.row);f.appendChild(c.row);f.appendChild(u.row);
    f.appendChild(el("div",{style:{display:"flex",gap:"8px",marginTop:"6px"}},
      el("button",{class:"pri",onClick:function(){
        a.name=n.input.value;a.cat=c.input.value;a.url=u.input.value;
        if(isNew)apis.push(a);saveApis(apis);build();
      }},"Speichern"),
      el("button",{class:"sec",onClick:build},"Abbrechen")
    ));
    scroll.appendChild(f);
  }
  build();
  return scroll;
}
